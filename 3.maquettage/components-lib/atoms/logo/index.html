<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Logo</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 500: 'var(--color-primary-500)' } }, fontFamily: { heading: ['Outfit', 'sans-serif'] } } } };
    </script>
</head>

<body class="bg-gray-50 p-10 font-sans space-y-6">

    <div class="space-y-8">
        <div>
            <h2 class="text-xs text-slate-400 font-mono uppercase mb-4">Logo Par Défaut</h2>
            <a class="flex items-center gap-2 group outline-none" href="#" aria-label="SoliQuiz Accueil">
                <div
                    class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/10 transition-transform group-hover:scale-110">
                    <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <path d="m9 15 2 2 4-4" />
                    </svg>
                </div>
                <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                        class="text-primary-500">Quiz</span></span>
            </a>
        </div>

        <div>
            <h2 class="text-xs text-slate-400 font-mono uppercase mb-4">Logo Apprenant</h2>

                    <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                            class="text-primary-500">Quiz</span></span>
                    <span
                        class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Apprenant</span>

            </a>
        </div>

        <div>
            <h2 class="text-xs text-slate-400 font-mono uppercase mb-4">Logo Formateur</h2>
            <a class="flex items-center gap-2 group outline-none" href="#" aria-label="SoliQuiz Formateur">

                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />

                        class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Formateur</span>

                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />

</html>
