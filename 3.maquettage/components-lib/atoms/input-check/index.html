<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Input Check (Radio/Checkbox)</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 500: 'var(--color-primary-500)' } } } } };
    </script>
</head>

<body class="bg-white p-10 font-sans space-y-8 max-w-sm">

    <div>
        <h2 class="text-xs text-slate-400 font-mono uppercase mb-3">Radio (Choix Unique)</h2>
        <!-- Atom : Input Radio (Avec Wrapper Label Inclus pour l'exemple interactif, l'atome est l'input) -->
        <label for="radio-1"
            class="flex p-3 w-full bg-white border border-slate-200 rounded-xl text-sm focus-within:ring-2 focus-within:ring-primary-500 focus-within:border-primary-500 hover:bg-slate-50 cursor-pointer transition-colors">
            <input type="radio" name="hs-radio-group"
                class="shrink-0 mt-0.5 border-slate-300 rounded-full text-primary-500 focus:ring-primary-500"
                id="radio-1" checked>
            <span class="text-sm text-slate-800 ms-3">echo()</span>
        </label>
    </div>

    <div>
        <h2 class="text-xs text-slate-400 font-mono uppercase mb-3">Checkbox (Choix Multiple)</h2>
        <!-- Atom : Input Checkbox -->
        <label for="check-1"
            class="flex p-3 w-full bg-white border border-slate-200 rounded-xl text-sm focus-within:ring-2 focus-within:ring-primary-500 focus-within:border-primary-500 hover:bg-slate-50 cursor-pointer transition-colors">
            <input type="checkbox"
                class="shrink-0 mt-0.5 border-slate-300 rounded text-primary-500 focus:ring-primary-500" id="check-1">
            <span class="text-sm text-slate-800 ms-3">Variable publique</span>
        </label>
    </div>

</body>

</html>
