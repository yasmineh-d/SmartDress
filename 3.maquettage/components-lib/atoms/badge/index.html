<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom: Badge</title>
    <!-- CSS Custom -->
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            100: 'var(--color-primary-100)',
                            800: 'var(--color-primary-800)',
                        },
                        semantic: {
                            success: 'var(--color-success-500)',
                            successLight: 'var(--color-success-100)',
                            error: 'var(--color-error-500)',
                            errorLight: 'var(--color-error-100)',
                            warning: 'var(--color-warning-500)',
                            warningLight: 'var(--color-warning-100)',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white p-10 font-sans space-y-6 flex flex-col items-start">

    <h2 class="text-xs text-slate-400 font-mono uppercase mb-4">Badges Soft Premium</h2>
    <div class="flex flex-wrap gap-4">
        <span
            class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-primary-50 text-primary-600 uppercase tracking-widest border border-primary-100/50 shadow-sm">
            Nouveau QCM
        </span>
        <span
            class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-semantic-successLight/30 text-semantic-success uppercase tracking-widest border border-semantic-successLight shadow-sm">
            Réussi (100%)
        </span>
        <span
            class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-semantic-warningLight/30 text-semantic-warning uppercase tracking-widest border border-semantic-warningLight shadow-sm">
            En attente
        </span>
        <span
            class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-semantic-errorLight/30 text-semantic-error uppercase tracking-widest border border-semantic-errorLight shadow-sm">
            Échec (20%)
        </span>
    </div>

    <h2 class="text-xs text-slate-400 font-mono uppercase mt-6 mb-4">Badges avec Icônes</h2>
    <div class="flex flex-wrap gap-4">
        <span
            class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-semantic-errorLight/20 text-semantic-error uppercase tracking-widest border border-semantic-errorLight/30 shadow-sm">
            <svg class="size-3 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            03:45
        </span>
    </div>

</body>

</html>
