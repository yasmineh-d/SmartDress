<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Header Timer</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 50: 'var(--color-primary-50)' }, semantic: { warningLight: 'var(--color-warning-100)', warning: 'var(--color-warning-500)' } } } } };</script>
</head>

<body class="bg-gray-50 flex items-start pt-[5%]">

    <!-- Molecule : Header Timer (Mode focus complet, sticky top) -->
    <header class="w-full bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 md:py-5 sm:px-6 lg:px-8 flex justify-between items-center w-full">

            <!-- Progress Info -->
            <div class="flex items-center gap-4">
                <h1 class="text-xl md:text-2xl font-bold font-heading text-slate-900 tracking-tight">QCM : Algorithmique
                    Avancée</h1>
                <span
                    class="hidden md:inline-flex bg-slate-100 text-slate-600 py-1.5 px-3 rounded-full text-xs font-semibold">
                    Question 4 / 20
                </span>
            </div>

            <!-- Timer Badge (Warning State example) -->
            <div
                class="animate-pulse flex items-center gap-2 bg-semantic-warningLight border border-semantic-warning/30 py-2 px-4 rounded-xl shrink-0">
                <svg class="shrink-0 size-4 text-semantic-warning" xmlns="http://www.w3.org/2000/svg" width="24"
                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span class="text-sm font-bold text-semantic-warning font-mono">03:45</span>
            </div>

        </div>
        <!-- Progress Bar (Atome intégré au body base pour le focus mode) -->
        <div class="h-1 bg-slate-100 w-full" role="progressbar" aria-valuenow="20" aria-valuemin="0"
            aria-valuemax="100">
            <div class="flex flex-col justify-center rounded-r-full overflow-hidden bg-primary-500 h-1 transition-all duration-500"
                style="width: 20%"></div>
        </div>
    </header>

</body>

</html>
