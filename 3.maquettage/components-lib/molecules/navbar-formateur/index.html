<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Navbar Formateur</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50">

    <!-- Molecule : Navbar Formateur -->
    <!-- Atoms : logo, link (nav-menu), button, avatar, text -->
    <!-- Molecule : Navbar Formateur -->
    <header
        class="flex flex-wrap md:justify-start md:flex-nowrap z-50 w-full bg-white border-b border-slate-200 sticky top-0">
        <nav class="relative max-w-7xl w-full flex flex-wrap md:grid md:grid-cols-12 basis-full items-center px-4 md:px-6 mx-auto py-3"
            aria-label="Navigation Formateur">

            <!-- Logo -->
            <div class="md:col-span-3">
                <a class="flex items-center gap-2 group outline-none" href="#" aria-label="SoliQuiz Formateur">
                    <div
                        class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/20 transition-transform group-hover:rotate-6">
                        <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                                class="text-primary-500">Quiz</span></span>
                        <span
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Formateur</span>
                    </div>
                </a>
            </div>

            <!-- Nav Menu (Centre - Hidden on Mobile) -->
            <div class="hidden md:flex md:col-span-6 justify-center items-center gap-x-6">
                <a href="#" id="nav-mes-classes" class="font-medium text-primary-500 focus:outline-none"
                    aria-current="page">Mes Classes</a>
                <a href="#" id="nav-mes-qcm"
                    class="font-medium text-slate-500 hover:text-slate-800 transition-colors focus:outline-none">Mes
                    QCM</a>
                <a href="#" id="nav-editeur"
                    class="font-medium text-slate-500 hover:text-slate-800 transition-colors focus:outline-none">Éditeur</a>
            </div>

            <!-- Actions Droite -->
            <div class="flex items-center gap-x-3 md:gap-x-4 ms-auto md:col-span-3 justify-end">
                <a href="#" id="btn-new-qcm"
                    class="hidden sm:inline-flex items-center gap-1.5 py-2 px-3 text-xs font-semibold rounded-xl border border-transparent bg-primary-500 text-white hover:bg-primary-600 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Nouveau QCM
                </a>
                <button type="button"
                    class="flex items-center justify-center w-[38px] h-[38px] rounded-full border border-slate-200 bg-white hover:bg-slate-100 transition-colors">
                    <img class="inline-block size-[32px] rounded-full"
                        src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=facearea&facepad=2&w=300&h=300&q=80"
                        alt="Avatar Formateur">
                </button>
            </div>
        </nav>
    </header>

    <!-- Navigation Mobile Formateur (Bottom Nav - Dark Context) -->
    <nav class="md:hidden fixed bottom-0 w-full bg-slate-900 border-t border-white/10 z-50">
        <div class="flex justify-around items-center h-[72px] px-4 pb-safe text-white">
            <a href="#" class="flex flex-col items-center justify-center text-primary-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="3" width="7" height="9" />
                    <rect x="14" y="3" width="7" height="5" />
                    <rect x="14" y="12" width="7" height="9" />
                    <rect x="3" y="16" width="7" height="5" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">QCMs</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center text-slate-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Classe</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center text-slate-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Profil</span>
            </a>
        </div>
    </nav>

</body>

</html>
