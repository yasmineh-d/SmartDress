<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Type Selector</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-lg mx-auto">

    <!-- Molecule : Type Selector -->
    <!-- Atoms : button (icon style) -->
    <!-- Contexte : Choix du type de question dans l'éditeur -->

    <div class="flex flex-col gap-3">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Type de Question</label>

        <div class="inline-flex p-1.5 bg-slate-100 border border-slate-200 rounded-2xl gap-1 w-fit">

            <!-- Type 1: Choix unique -->
            <button
                class="flex items-center gap-2 py-2 px-3.5 bg-white text-primary-600 rounded-xl shadow-sm border border-slate-200 text-sm font-semibold transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="9" />
                    <circle cx="12" cy="12" r="4" fill="currentColor" fill-opacity="0.2" />
                </svg>
                Unique
            </button>

            <!-- Type 2: Choix multiple -->
            <button
                class="flex items-center gap-2 py-2 px-3.5 text-slate-500 hover:text-slate-700 hover:bg-white/50 rounded-xl text-sm font-medium transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="3" width="18" height="18" rx="4" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
                Multiple
            </button>

            <!-- Type 3: Vrai / Faux -->
            <button
                class="flex items-center gap-2 py-2 px-3.5 text-slate-500 hover:text-slate-700 hover:bg-white/50 rounded-xl text-sm font-medium transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path d="m7 12 5 5L22 7M2 12l5 5m5-5 5-5" />
                </svg>
                Vrai/Faux
            </button>

        </div>
    </div>

</body>

</html>
