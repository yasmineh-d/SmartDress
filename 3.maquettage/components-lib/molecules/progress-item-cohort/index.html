<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Progress Item Cohort</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-lg mx-auto">

    <!-- Molecule : Progress Item Cohort -->
    <!-- Variante de progress-item avec indicateur de tendance -->
    <!-- Contexte : Formateur dashboard (succès par objectif) -->

    <div
        class="flex flex-col gap-2 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-primary-200 transition-all group">
        <div class="flex items-center justify-between">
            <span class="text-sm font-semibold text-slate-800">C1 — Maquetter une application</span>
            <div class="flex items-center gap-1.5 px-2 py-0.5 bg-emerald-50 rounded-lg">
                <svg class="w-3 h-3 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
                </svg>
                <span class="text-[10px] font-bold text-emerald-600">+12%</span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex-grow bg-slate-100 rounded-full h-2.5 overflow-hidden">
                <div class="bg-primary-500 h-full rounded-full transition-all duration-700" style="width: 68%"></div>
            </div>
            <span class="text-sm font-bold text-slate-900 w-10 text-right tracking-tight">68%</span>
        </div>

        <div
            class="flex items-center justify-between text-[10px] font-medium text-slate-400 uppercase tracking-tighter">
            <span>25/32 Apprenants ont validé</span>
            <a href="#" class="text-primary-500 hover:underline">Détails</a>
        </div>
    </div>

</body>

</html>
