<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Feature Card</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'var(--color-primary-50)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' }
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-slate-50 p-10 grid md:grid-cols-3 gap-8">

    <!-- Molecule : Feature Card -->
    <div
        class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-2 transition-all duration-300">
        <div class="size-14 bg-primary-50 text-primary-500 rounded-2xl flex items-center justify-center mb-6">
            <svg class="size-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
        </div>
        <h3 class="text-xl font-bold mb-4 text-slate-900">Temps Réel</h3>
        <p class="text-slate-600 leading-relaxed text-sm">Visualisez les réponses de vos apprenants en direct et
            réajustez votre cours instantanément.</p>
    </div>

    <!-- Variant: Emerald -->
    <div
        class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-2 transition-all duration-300">
        <div class="size-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-6">
            <svg class="size-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </div>
        <h3 class="text-xl font-bold mb-4 text-slate-900">Sync SoliLMS</h3>
        <p class="text-slate-600 leading-relaxed text-sm">Plus besoin de copier les notes. Tout est exporté
            automatiquement vers votre plateforme LMS.</p>
    </div>

</body>

</html>
