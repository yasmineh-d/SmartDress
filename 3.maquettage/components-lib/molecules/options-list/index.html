<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Options List</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-2xl mx-auto">

    <!-- Molecule : Options List -->
    <!-- Conteneur de la liste des options d'une question -->
    <!-- Atoms : option-item (molécule) -->

    <div class="space-y-3">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-9">Options de réponse</label>

        <!-- Molécule: Option Item x3 -->
        <div class="space-y-3">
            <div class="flex items-center gap-3 group">
                <div class="w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center text-white">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <input type="text" value="echo()"
                    class="flex-grow py-2 px-4 bg-white border border-slate-200 rounded-xl text-sm outline-none border-l-4 border-l-emerald-500" />
                <button class="p-2 text-slate-300 opacity-0 group-hover:opacity-100 transition-all"><svg class="w-4 h-4"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg></button>
            </div>

            <div class="flex items-center gap-3 group">
                <div class="w-6 h-6 rounded-full border-2 border-slate-200"></div>
                <input type="text" value="print()"
                    class="flex-grow py-2 px-4 bg-white border border-slate-200 rounded-xl text-sm outline-none" />
                <button class="p-2 text-slate-300 opacity-0 group-hover:opacity-100 transition-all"><svg class="w-4 h-4"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg></button>
            </div>
        </div>

        <!-- Add Option Button -->
        <div class="pl-9 pt-2">
            <button
                class="text-sm font-semibold text-primary-500 hover:text-primary-600 flex items-center gap-1.5 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Ajouter un choix
            </button>
        </div>
    </div>

</body>

</html>
