<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Hero Admin</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)' } } } } };</script>
</head>

<body class="bg-slate-100 p-10">

    <!-- Molecule : Hero Admin -->
    <!-- Atoms : title (h1), text -->
    <!-- Contexte : Haut de page dashboard admin -->

    <section class="max-w-7xl mx-auto py-10 px-6 bg-slate-900 rounded-3xl relative overflow-hidden shadow-2xl">
        <!-- Background Decor -->
        <div class="absolute top-0 right-0 -mt-20 -mr-20 w-80 h-80 bg-primary-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 left-0 -mb-20 -ml-20 w-64 h-64 bg-primary-500/5 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <nav class="flex items-center gap-2 text-primary-400 text-xs font-bold uppercase tracking-widest mb-4">
                <span class="size-1.5 rounded-full bg-primary-500 animate-pulse"></span>
                Console de Supervision
            </nav>
            <h1 class="text-3xl sm:text-4xl font-heading font-bold text-white leading-tight">
                État de santé du centre <span class="text-primary-500">Solicode</span>
            </h1>
            <p class="mt-4 text-slate-400 max-w-2xl leading-relaxed text-sm sm:text-base">
                Supervision globale des synchronisations SoliLMS, des performances des cohortes et de la gestion des
                accès formateurs.
            </p>

            <div class="mt-8 flex gap-4">
                <button
                    class="py-2.5 px-6 bg-primary-500 text-white font-bold rounded-xl hover:bg-primary-600 transition-colors shadow-lg shadow-primary-500/30">
                    Synchronisation forcée
                </button>
                <button
                    class="py-2.5 px-6 bg-white/10 text-white font-bold rounded-xl hover:bg-white/20 transition-all backdrop-blur-sm border border-white/5">
                    Rapport mensuel
                </button>
            </div>
        </div>
    </section>

</body>

</html>
