<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Footer Editor</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 flex items-end h-screen pb-0">

    <!-- Molecule : Footer Editor -->
    <!-- Atoms : button-add, button-publish -->
    <!-- Contexte : Barre fixe en bas de l'éditeur QCM -->

    <footer class="w-full bg-white border-t border-slate-200 px-6 py-4 shadow-lg z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">

            <div class="flex items-center gap-4 text-xs text-slate-400">
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    Dernière sauvegarde : il y a 2 min
                </span>
                <span class="hidden sm:inline">•</span>
                <span class="hidden sm:inline">2 questions créées</span>
            </div>

            <div class="flex items-center gap-3">
                <button type="button"
                    class="py-2.5 px-5 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 shadow-sm hover:bg-slate-50 transition-colors">
                    Enregistrer le brouillon
                </button>
                <button type="button"
                    class="py-2.5 px-5 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-transparent bg-primary-500 text-white hover:bg-primary-600 transition-colors shadow-md shadow-primary-500/20">
                    Publier et assigner
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

</body>

</html>
