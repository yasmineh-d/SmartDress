<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Pagination</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans'],
                        heading: ['Outfit', 'sans']
                    },
                    colors: {
                        primary: {
                            50: 'var(--color-primary-50)',
                            100: 'var(--color-primary-100)',
                            200: 'var(--color-primary-200)',
                            500: 'var(--color-primary-500)',
                            600: 'var(--color-primary-600)'
                        }
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-slate-50 p-12 flex flex-col items-center gap-12">

    <div class="space-y-4 text-center">
        <h2 class="text-sm font-black uppercase tracking-[0.3em] text-slate-400 italic">Style Standard</h2>
        <!-- Intégration de la pagination -->
        <nav class="flex items-center gap-x-2" aria-label="Pagination">
            <!-- Bouton Précédent -->
            <button type="button"
                class="group min-h-10 min-w-10 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-xs font-black uppercase tracking-widest italic rounded-2xl text-slate-400 hover:text-primary-600 hover:bg-primary-50 focus:outline-none focus:bg-primary-50 disabled:opacity-50 disabled:pointer-events-none transition-all"
                aria-label="Previous">
                <svg class="shrink-0 size-3.5 transition-transform group-hover:-translate-x-0.5"
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                <span class="hidden sm:inline-block">Précédent</span>
            </button>

            <!-- Pages -->
            <div class="flex items-center gap-x-1.5">
                <button type="button"
                    class="size-10 flex justify-center items-center bg-primary-500 text-white font-black text-sm rounded-2xl shadow-lg shadow-primary-500/20 active:scale-90 transition-all"
                    aria-current="page">1</button>
                <button type="button"
                    class="size-10 flex justify-center items-center text-slate-500 font-bold text-sm rounded-2xl border border-slate-100 bg-white hover:border-primary-200 hover:text-primary-600 hover:bg-primary-50 focus:outline-none focus:bg-primary-50 active:scale-90 transition-all">2</button>
                <button type="button"
                    class="size-10 flex justify-center items-center text-slate-500 font-bold text-sm rounded-2xl border border-slate-100 bg-white hover:border-primary-200 hover:text-primary-600 hover:bg-primary-50 focus:outline-none focus:bg-primary-50 active:scale-90 transition-all">3</button>
                <span class="text-slate-300 px-1 font-black text-xs italic tracking-widest">...</span>
                <button type="button"
                    class="size-10 flex justify-center items-center text-slate-500 font-bold text-sm rounded-2xl border border-slate-100 bg-white hover:border-primary-200 hover:text-primary-600 hover:bg-primary-50 focus:outline-none focus:bg-primary-50 active:scale-90 transition-all">12</button>
            </div>

            <!-- Bouton Suivant -->
            <button type="button"
                class="group min-h-10 min-w-10 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-xs font-black uppercase tracking-widest italic rounded-2xl text-slate-400 hover:text-primary-600 hover:bg-primary-50 focus:outline-none focus:bg-primary-50 disabled:opacity-50 disabled:pointer-events-none transition-all"
                aria-label="Next">
                <span class="hidden sm:inline-block">Suivant</span>
                <svg class="shrink-0 size-3.5 transition-transform group-hover:translate-x-0.5"
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
        </nav>
    </div>

    <!-- Variante : Petits boutons -->
    <div class="space-y-4 text-center">
        <h2 class="text-sm font-black uppercase tracking-[0.3em] text-slate-400 italic">Variante Compacte</h2>
        <nav class="flex items-center gap-x-1" aria-label="Pagination">
            <button type="button"
                class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg text-slate-800 hover:bg-slate-100 focus:outline-none focus:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none"
                aria-label="Previous">
                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <div class="flex items-center gap-x-1">
                <button type="button"
                    class="size-8 flex justify-center items-center bg-primary-100 text-primary-600 font-bold text-xs rounded-lg"
                    aria-current="page">1</button>
                <button type="button"
                    class="size-8 flex justify-center items-center text-slate-500 text-xs rounded-lg hover:bg-slate-100">2</button>
                <button type="button"
                    class="size-8 flex justify-center items-center text-slate-500 text-xs rounded-lg hover:bg-slate-100">3</button>
            </div>
            <button type="button"
                class="size-8 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg text-slate-800 hover:bg-slate-100 focus:outline-none focus:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none"
                aria-label="Next">
                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
        </nav>
    </div>

</body>

</html>
