<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Card QCM</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 50: 'var(--color-primary-50)', 500: 'var(--color-primary-500)' }, semantic: { warningLight: 'var(--color-warning-100)', warning: 'var(--color-warning-500)' } } } } };</script>
</head>

<body class="bg-gray-50 p-10 flex gap-6">

    <!-- Molecule : Card QCM -->
    <a class="group flex flex-col bg-white border shadow-sm rounded-2xl hover:shadow-md transition-all duration-300 w-full max-w-sm overflow-hidden border-slate-200"
        href="#">
        <div class="p-4 md:p-6">
            <div class="flex justify-between items-center mb-4">
                <span
                    class="inline-flex items-center gap-1.5 py-1.5 px-3 rounded-full text-[10px] font-bold bg-semantic-warningLight/30 text-semantic-warning border border-semantic-warningLight uppercase tracking-widest shadow-sm">
                    Urgent
                </span>
                <!-- Atom: Text Small -->
                <span class="text-xs text-slate-500 font-medium">10 Questions</span>
            </div>

            <h3
                class="text-xl font-bold text-slate-800 font-heading leading-tight group-hover:text-primary-600 transition-colors">
                Fondamentaux du PHP
            </h3>

            <!-- Atom: Text -->
            <p class="mt-2 text-sm text-slate-600">
                Évaluation portant sur les variables, boucles et fonctions de base.
            </p>
        </div>

        <div
            class="bg-slate-50 border-t border-slate-200 p-4 md:p-5 flex justify-between items-center group-hover:bg-primary-50 transition-colors">
            <span
                class="text-sm font-bold text-primary-600 flex items-center gap-1 font-heading uppercase tracking-wide">
                Commencer le test
                <svg class="shrink-0 size-4 transition ease-in-out group-hover:translate-x-1"
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </span>
            <span class="text-xs text-slate-500 flex items-center gap-1.5">
                <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                15 min
            </span>
        </div>
    </a>

</body>

</html>
