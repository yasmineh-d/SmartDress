<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Search Form</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-lg mx-auto">

    <!-- Molecule : Search Form -->
    <!-- Atoms : input (search), button -->
    <!-- Contexte : dashboards admin/formateur pour filtrer utilisateurs/QCM -->

    <div class="w-full flex items-center gap-3">
        <!-- SearchBox ComboBox -->
        <div class="relative flex-grow" data-hs-combo-box='{
            "groupingType": "default",
            "isOpenOnFocus": true,
            "apiUrl": "../assets/data/searchbox.json",
            "apiGroupField": "category"
          }'>
            <div class="relative">
                <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
                    <svg class="shrink-0 size-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </div>
                <input
                    class="py-3 ps-10 pe-4 block w-full border-slate-200 rounded-xl text-sm focus:border-primary-500 focus:ring-primary-500 outline-none transition-all border shadow-sm"
                    type="text" role="combobox" aria-expanded="false" placeholder="Rechercher par nom..."
                    data-hs-combo-box-input="">
            </div>

            <!-- SearchBox Dropdown -->
            <div class="absolute z-50 w-full bg-white border border-slate-100 rounded-xl shadow-2xl p-2 mt-2"
                style="display: none;" data-hs-combo-box-output="">
                <div class="max-h-72 rounded-b-xl overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:bg-slate-300"
                    data-hs-combo-box-output-items-wrapper=""></div>
            </div>
        </div>

        <!-- Atom: Button (Search/Submit) -->
        <button type="submit"
            class="py-2.5 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-transparent bg-primary-500 text-white hover:bg-primary-600 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2">
            Chercher
        </button>
        </form>

</body>

</html>
