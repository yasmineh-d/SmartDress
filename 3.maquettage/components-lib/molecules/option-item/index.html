<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Option Item</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-2xl mx-auto">

    <!-- Molecule : Option Item -->
    <!-- Atoms : input (text), checkbox (correct), button (delete) -->
    <!-- Contexte : Ligne de réponse dans l'éditeur de question -->

    <div class="flex items-center gap-3 group">
        <!-- Mark as correct atom -->
        <label class="shrink-0 cursor-pointer" title="Marquer comme correcte">
            <input type="checkbox" class="sr-only peer">
            <div
                class="w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center peer-checked:bg-emerald-500 peer-checked:border-emerald-500 text-transparent peer-checked:text-white transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </label>

        <!-- Input answer atom -->
        <input type="text" placeholder="Entrez une réponse possible..."
            class="flex-grow py-2.5 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-all" />

        <!-- Delete button atom -->
        <button
            class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>

</body>

</html>
