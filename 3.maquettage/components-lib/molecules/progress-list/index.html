<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Progress List</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-lg mx-auto">

    <!-- Molecule : Progress List -->
    <!-- Conteneur de plusieurs progress-items -->
    <!-- Atoms : progress-item (molécule) -->

    <div class="space-y-4">

        <!-- Progress Item 1 -->
        <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between text-sm font-medium">
                <span class="text-slate-700">Compréhension des algorithmes</span>
                <span class="text-primary-500">75%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2">
                <div class="bg-primary-500 h-2 rounded-full" style="width: 75%"></div>
            </div>
        </div>

        <!-- Progress Item 2 -->
        <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between text-sm font-medium">
                <span class="text-slate-700">Syntaxe PHP 8.x</span>
                <span class="text-emerald-500">92%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2">
                <div class="bg-emerald-500 h-2 rounded-full" style="width: 92%"></div>
            </div>
        </div>

        <!-- Progress Item 3 -->
        <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between text-sm font-medium">
                <span class="text-slate-700">Conception de bases de données</span>
                <span class="text-amber-500">45%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2">
                <div class="bg-amber-400 h-2 rounded-full" style="width: 45%"></div>
            </div>
        </div>

    </div>

</body>

</html>
