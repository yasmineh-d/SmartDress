<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Navbar Admin</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-100">

    <!-- Molecule : Navbar Admin -->
    <!-- Atoms : logo, link (nav-menu), avatar -->
    <header class="flex flex-wrap md:justify-start md:flex-nowrap z-50 w-full bg-slate-900 border-b border-slate-700">
        <nav class="relative max-w-7xl w-full flex flex-wrap md:grid md:grid-cols-12 basis-full items-center px-4 md:px-6 mx-auto py-3"
            aria-label="Navigation Admin">

            <!-- Logo Admin -->
            <div class="md:col-span-4">
                <a class="flex items-center gap-2 group outline-none" href="#" aria-label="SoliQuiz Admin">
                    <div
                        class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/20 transition-transform group-hover:scale-110">
                        <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-xl font-heading font-bold text-white tracking-tight">Soli<span
                                class="text-primary-500">Quiz</span></span>
                        <span
                            class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] ml-0.5">Admin</span>
                    </div>
                </a>
            </div>

            <!-- Nav Menu -->
            <div class="hidden md:flex md:col-span-5 justify-center items-center gap-x-6">
                <a href="#" id="nav-vue-centre" class="font-medium text-primary-400 focus:outline-none text-sm"
                    aria-current="page">
                    Vue Centre
                </a>
                <a href="#" id="nav-acces"
                    class="font-medium text-slate-400 hover:text-white transition-colors focus:outline-none text-sm">
                    Accès
                </a>
                <a href="#" id="nav-solilms-sync"
                    class="font-medium text-slate-400 hover:text-white transition-colors focus:outline-none text-sm">
                    SoliLMS Sync
                </a>
            </div>

            <!-- User -->
            <div class="flex items-center gap-x-3 ms-auto md:col-span-3 justify-end">
                <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-white text-xs font-semibold"
                    aria-label="SuperAdmin Fouad">
                    FA
                </div>
                <span class="hidden md:inline-block text-sm font-medium text-slate-300">SuperAdmin Fouad</span>
                <a href="#" id="btn-admin-logout" class="text-slate-500 hover:text-red-400 transition-colors ml-1"
                    aria-label="Déconnexion">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                    </svg>
                </a>
            </div>
        </nav>
    </header>

</body>

</html>
