<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Question Container</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 50: '#f0fdfe', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 flex justify-center">

    <!-- Molecule : Question Container -->
    <!-- Atoms : text (question), choice-list (molécule) -->
    <!-- Contexte : page passation QCM -->

    <div class="w-full max-w-2xl bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">

        <!-- Atom: Text — Énoncé de la question -->
        <p class="text-base font-semibold text-slate-800 leading-relaxed mb-6">
            Quelle est la fonction PHP correcte pour afficher du texte ?
        </p>

        <!-- Molecule: Choice List (inline) -->
        <!-- Variant : choix unique (radio) -->
        <fieldset class="space-y-3" aria-labelledby="question-label">
            <legend class="sr-only">Choisissez une réponse</legend>

            <!-- Molecule: Choice Item 1 -->
            <label id="choice-1"
                class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-primary-400 hover:bg-primary-50 transition-all group">
                <input type="radio" name="question-1" value="1"
                    class="w-4 h-4 text-primary-500 border-slate-300 focus:ring-primary-500">
                <span class="text-sm text-slate-700 group-hover:text-slate-900 font-medium">echo()</span>
            </label>

            <!-- Molecule: Choice Item 2 -->
            <label id="choice-2"
                class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-primary-400 hover:bg-primary-50 transition-all group">
                <input type="radio" name="question-1" value="2"
                    class="w-4 h-4 text-primary-500 border-slate-300 focus:ring-primary-500">
                <span class="text-sm text-slate-700 group-hover:text-slate-900 font-medium">print()</span>
            </label>

            <!-- Molecule: Choice Item 3 -->
            <label id="choice-3"
                class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-primary-400 hover:bg-primary-50 transition-all group">
                <input type="radio" name="question-1" value="3"
                    class="w-4 h-4 text-primary-500 border-slate-300 focus:ring-primary-500">
                <span class="text-sm text-slate-700 group-hover:text-slate-900 font-medium">alert()</span>
            </label>

            <!-- Molecule: Choice Item 4 -->
            <label id="choice-4"
                class="flex items-center gap-4 p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-primary-400 hover:bg-primary-50 transition-all group">
                <input type="radio" name="question-1" value="4"
                    class="w-4 h-4 text-primary-500 border-slate-300 focus:ring-primary-500">
                <span class="text-sm text-slate-700 group-hover:text-slate-900 font-medium">display()</span>
            </label>

        </fieldset>
    </div>

</body>

</html>
