<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Data Table</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-5xl mx-auto">

    <!-- Molecule : Data Table -->
    <!-- Conteneur de tableau avec entête et lignes -->
    <!-- Atoms : table-row (molécule) -->

    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-start">
                            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Date /
                                Heure</span>
                        </th>
                        <th scope="col" class="px-6 py-3 text-start">
                            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Test /
                                Session</span>
                        </th>
                        <th scope="col" class="px-6 py-3 text-start">
                            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Sync
                                Statut</span>
                        </th>
                        <th scope="col" class="px-6 py-3 text-center">
                            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Action</span>
                        </th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <!-- Molecule: Table Row 1 -->
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex flex-col">
                                <span class="text-sm font-medium text-slate-800">03 Mars 2026</span>
                                <span class="text-xs text-slate-400">14:30</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="text-sm text-slate-600 font-medium">PHP Basics — DW101</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span
                                class="inline-flex items-center gap-x-1.5 py-1 px-2.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800">
                                <span class="size-1.5 rounded-full bg-emerald-500"></span>
                                Succès 100%
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <button
                                class="size-8 inline-flex items-center justify-center rounded-lg text-primary-500 hover:bg-primary-50 transition-colors"
                                title="Consulter">
                                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2.5">
                                    <path
                                        d="M2.036 12.322a1.012 1.012 0 010-.644C3.323 8.192 7.391 5 12 5c4.609 0 8.677 3.192 9.964 6.678.113.284.113.56 0 .644-1.323 3.828-5.391 7-9.964 7-4.609 0-8.677-3.192-9.964-6.678z" />
                                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </td>
                    </tr>

                    <!-- Molecule: Table Row 2 -->
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-800 font-medium">02 Mars 2026</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600 font-medium">Algorithmiques —
                            MOB01</td>
                        <td class="px-6 py-4 whitespace-nowrap italic text-slate-400 text-sm">Synchronisation en
                            cours...</td>
                        <td class="px-6 py-4 whitespace-nowrap text-end">
                            <button
                                class="text-slate-400 hover:text-slate-600 font-medium text-sm transition-colors cursor-not-allowed">
                                <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>

</html>
