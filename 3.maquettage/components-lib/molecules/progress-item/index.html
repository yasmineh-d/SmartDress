<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Progress Item</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-md mx-auto space-y-3">

    <!-- Molecule : Progress Item -->
    <!-- Atoms : text (label), progress-bar -->

    <!-- Variant: bonne progression -->
    <div class="flex flex-col gap-1">
        <div class="flex items-center justify-between">
            <!-- Atom: Text label -->
            <span class="text-sm font-medium text-slate-700">Algorithmique</span>
            <!-- Atom: Text percent -->
            <span class="text-sm font-semibold text-primary-500">85%</span>
        </div>
        <!-- Atom: Progress bar -->
        <div class="w-full bg-slate-200 rounded-full h-2">
            <div class="bg-primary-500 h-2 rounded-full transition-all duration-500" style="width: 85%"
                role="progressbar" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100"
                aria-label="Algorithmique : 85%"></div>
        </div>
    </div>

    <!-- Variant: progression faible (warning) -->
    <div class="flex flex-col gap-1">
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-slate-700">Conception UML</span>
            <span class="text-sm font-semibold text-amber-500">40%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2">
            <div class="bg-amber-400 h-2 rounded-full transition-all duration-500" style="width: 40%" role="progressbar"
                aria-valuenow="40" aria-valuemin="0" aria-valuemax="100" aria-label="Conception UML : 40%"></div>
        </div>
    </div>

    <!-- Variant: progression complète -->
    <div class="flex flex-col gap-1">
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-slate-700">HTML / CSS</span>
            <span class="text-sm font-semibold text-emerald-500">100%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2">
            <div class="bg-emerald-500 h-2 rounded-full transition-all duration-500" style="width: 100%"
                role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"
                aria-label="HTML/CSS : 100%"></div>
        </div>
    </div>

</body>

</html>
