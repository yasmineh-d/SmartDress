<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: List Item</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-lg mx-auto space-y-2">

    <!-- Molecule : List Item -->
    <!-- Atoms : text, badge, link -->
    <!-- Utilisé dans : list-history (apprenant-dashboard) -->

    <!-- Item 1 — Score élevé -->
    <div
        class="flex items-center justify-between bg-white border border-slate-100 rounded-xl px-4 py-3 shadow-sm hover:border-primary-200 transition-colors">
        <div class="flex flex-col">
            <!-- Atom: Text principal -->
            <span class="text-sm font-semibold text-slate-800">HTML / CSS — Bases</span>
            <!-- Atom: Text secondaire (date) -->
            <span class="text-xs text-slate-400 mt-0.5">28 fév 2026</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Atom: Badge score (success) -->
            <span
                class="inline-flex items-center gap-x-1 py-1 px-2.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700">
                80%
            </span>
            <!-- Atom: Link action -->
            <a href="#"
                class="text-xs text-primary-500 hover:underline font-medium transition-colors whitespace-nowrap">
                Voir correction
            </a>
        </div>
    </div>

    <!-- Item 2 — Score moyen -->
    <div
        class="flex items-center justify-between bg-white border border-slate-100 rounded-xl px-4 py-3 shadow-sm hover:border-primary-200 transition-colors">
        <div class="flex flex-col">
            <span class="text-sm font-semibold text-slate-800">Algorithmique — Tri</span>
            <span class="text-xs text-slate-400 mt-0.5">25 fév 2026</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Atom: Badge score (warning) -->
            <span
                class="inline-flex items-center gap-x-1 py-1 px-2.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">
                55%
            </span>
            <a href="#"
                class="text-xs text-primary-500 hover:underline font-medium transition-colors whitespace-nowrap">
                Voir correction
            </a>
        </div>
    </div>

    <!-- Item 3 — Score faible -->
    <div
        class="flex items-center justify-between bg-white border border-slate-100 rounded-xl px-4 py-3 shadow-sm hover:border-primary-200 transition-colors">
        <div class="flex flex-col">
            <span class="text-sm font-semibold text-slate-800">UML — Diagramme Classes</span>
            <span class="text-xs text-slate-400 mt-0.5">20 fév 2026</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Atom: Badge score (danger) -->
            <span
                class="inline-flex items-center gap-x-1 py-1 px-2.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">
                30%
            </span>
            <a href="#"
                class="text-xs text-primary-500 hover:underline font-medium transition-colors whitespace-nowrap">
                Voir correction
            </a>
        </div>
    </div>

</body>

</html>
