<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Stats Banner</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-2xl mx-auto">

    <!-- Molecule : Stats Banner -->
    <!-- Atoms : stat (big chiffre + libellé) -->
    <!-- Contexte : formateur-dashboard hero -->

    <div class="flex flex-wrap items-center gap-4 mt-4">

        <!-- Atom: Stat — Moyenne cohorte -->
        <div
            class="flex flex-col items-center bg-white border border-slate-200 rounded-2xl px-6 py-4 shadow-sm min-w-[120px]">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Moyenne</span>
            <span class="text-3xl font-heading font-bold text-slate-800 leading-none mt-1">14<span
                    class="text-lg text-slate-400">/20</span></span>
        </div>

        <!-- Atom: Stat — Participation -->
        <div
            class="flex flex-col items-center bg-white border border-slate-200 rounded-2xl px-6 py-4 shadow-sm min-w-[120px]">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Participation</span>
            <span class="text-3xl font-heading font-bold text-primary-500 leading-none mt-1">85<span
                    class="text-lg text-primary-300">%</span></span>
        </div>

        <!-- Atom: Stat — Tests actifs -->
        <div
            class="flex flex-col items-center bg-white border border-slate-200 rounded-2xl px-6 py-4 shadow-sm min-w-[120px]">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Tests actifs</span>
            <span class="text-3xl font-heading font-bold text-slate-800 leading-none mt-1">3</span>
        </div>

    </div>

</body>

</html>
