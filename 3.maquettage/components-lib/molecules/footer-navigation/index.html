<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Footer Navigation</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 flex items-end h-screen pb-0">

    <!-- Molecule : Footer Navigation (Sticky) -->
    <!-- Atoms : text (status), button (prev/next) -->
    <!-- Contexte : page passation QCM -->

    <footer class="w-full bg-white border-t border-slate-200 px-4 py-3 shadow-md">
        <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">

            <!-- Atom: Text status (auto-sauvegarde) -->
            <span class="text-xs text-emerald-500 font-medium flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                Sauvegardé à 10:45
            </span>

            <div class="flex items-center gap-3">
                <!-- Atom: Button outline (Précédent) -->
                <button type="button" id="btn-prev-question"
                    class="inline-flex items-center gap-2 py-2 px-4 text-sm font-semibold rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                    Précédent
                </button>

                <!-- Atom: Button primary (Suivant / Valider) -->
                <button type="button" id="btn-next-question"
                    class="inline-flex items-center gap-2 py-2 px-4 text-sm font-semibold rounded-xl border border-transparent bg-primary-500 text-white hover:bg-primary-600 transition-colors">
                    Suivant
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

</body>

</html>
