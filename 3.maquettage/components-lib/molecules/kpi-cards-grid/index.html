<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: KPI Cards Grid</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 p-10 max-w-7xl mx-auto">

    <!-- Molecule : KPI Cards Grid -->
    <!-- Conteneur grid de kpi-cards -->
    <!-- Atoms : kpi-card (molécule déjà existante) -->

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">

        <!-- KPI Card 1 -->
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tests Actifs</span>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-heading font-bold text-slate-900">12</span>
                <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full">+2 ce
                    mois</span>
            </div>
        </div>

        <!-- KPI Card 2 -->
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Apprenants</span>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-heading font-bold text-slate-900">350</span>
                <span class="text-[10px] text-slate-400 font-medium">Inscrits cette année</span>
            </div>
        </div>

        <!-- KPI Card 3 -->
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">SoliLMS API</span>
            <div class="flex items-center gap-2 mt-1">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-semibold text-emerald-600">Connecté</span>
            </div>
        </div>

        <!-- KPI Card 4 -->
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-1">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Participation</span>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-heading font-bold text-slate-900">92%</span>
                <span class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-full">Score
                    Moyen</span>
            </div>
        </div>

    </div>

</body>

</html>
