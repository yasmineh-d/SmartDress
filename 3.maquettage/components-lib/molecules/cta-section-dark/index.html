<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: CTA Section Dark</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' }
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-white p-10">

    <!-- Molecule : CTA Section Dark -->
    <div class="bg-slate-900 rounded-[3rem] p-12 text-center relative overflow-hidden max-w-4xl mx-auto">
        <div class="absolute top-0 right-0 w-64 h-64 bg-primary-500/10 rounded-full blur-3xl"></div>
        <h3 class="text-2xl font-heading font-bold text-white mb-6">Prêt à évaluer ?</h3>
        <p class="text-slate-400 mb-10">Rejoignez les centres qui utilisent SoliQuiz pour dynamiser leurs formations.
        </p>
        <a href="#"
            class="inline-flex py-4 px-12 bg-primary-500 text-white font-bold rounded-2xl hover:bg-primary-600 transition-all uppercase tracking-widest text-sm">
            Accéder à mon espace
        </a>
    </div>

</body>

</html>
