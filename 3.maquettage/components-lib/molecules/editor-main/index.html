<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Editor Main</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50 p-6 max-w-4xl mx-auto">

    <!-- Molecule : Editor Main -->
    <!-- Conteneur principal de la liste des questions -->
    <!-- Atoms : question-card (déjà existant) -->

    <main class="space-y-6">

        <!-- Question Card Placeholder 1 -->
        <div
            class="bg-white border border-primary-500 rounded-2xl p-6 shadow-sm relative ring-2 ring-primary-500 ring-offset-4 ring-offset-slate-50">
            <span
                class="absolute -top-3 left-6 bg-primary-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Question
                1</span>
            <div class="text-center py-10 text-slate-400 border-2 border-dashed border-slate-100 rounded-xl">
                [ Molécule Question Card 1 ]
            </div>
        </div>

        <!-- Question Card Placeholder 2 -->
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm relative grayscale opacity-70">
            <span
                class="absolute -top-3 left-6 bg-slate-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Question
                2</span>
            <div class="text-center py-10 text-slate-400 border-2 border-dashed border-slate-100 rounded-xl">
                [ Molécule Question Card 2 ]
            </div>
        </div>

        <!-- Add Question Trigger area -->
        <button
            class="w-full py-8 border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 hover:border-primary-400 hover:text-primary-500 hover:bg-primary-50 transition-all flex flex-col items-center justify-center gap-2">
            <div
                class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center group-hover:bg-primary-100">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <span class="font-medium">Ajouter une question</span>
        </button>

    </main>

</body>

</html>
