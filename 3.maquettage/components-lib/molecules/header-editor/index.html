<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Header Editor</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' } } } } };</script>
</head>

<body class="bg-slate-50">

    <!-- Molecule : Header Editor -->
    <!-- Atoms : breadcrumbs, editable-title, button-save -->
    <!-- Contexte : page création/édition QCM -->

    <header class="w-full bg-white border-b border-slate-200 px-4 py-3 sm:px-6">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-4">

            <div class="flex items-center gap-4">
                <!-- Brand Logo (Shared) -->
                <a class="flex items-center gap-2 group outline-none" href="#" aria-label="Retour Accueil">
                    <div
                        class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/20 transition-transform group-hover:scale-105">
                        <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none hidden sm:flex">
                        <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                                class="text-primary-500">Quiz</span></span>
                        <span
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Formateur</span>
                    </div>
                </a>

                <div class="h-6 w-px bg-slate-200"></div>

                <div class="flex flex-col gap-1">
                    <!-- Molecule: Breadcrumbs (Placeholder) -->
                    <nav class="flex items-center text-xs font-medium text-slate-400 gap-2">
                        <a href="#" class="hover:text-primary-500 transition-colors">Accueil</a>
                        <span>/</span>
                        <a href="#" class="hover:text-primary-500 transition-colors">Mes QCM</a>
                        <span>/</span>
                        <span class="text-slate-500">Nouveau</span>
                    </nav>

                    <!-- Molecule: Editable Title -->
                    <div class="flex items-center gap-2 group">
                        <h1 class="text-xl font-heading font-bold text-slate-900 border-b-2 border-transparent focus:border-primary-500 outline-none"
                            contenteditable="true">
                            Concevoir une nouvelle évaluation
                        </h1>
                        <svg class="w-4 h-4 text-slate-300 group-hover:text-slate-400 transition-colors" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                    </div>
                </div>

                <!-- Atom: Button (Save) -->
                <div class="flex items-center gap-3">
                    <button type="button"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-slate-200 bg-white text-slate-800 shadow-sm hover:bg-slate-50 transition-colors">
                        Aperçu
                    </button>
                    <button type="button"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl border border-transparent bg-primary-500 text-white hover:bg-primary-600 transition-colors">
                        Enregistrer le QCM
                    </button>
                </div>
            </div>
    </header>

</body>

</html>
