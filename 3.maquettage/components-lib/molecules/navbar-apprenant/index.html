<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Navbar Apprenant</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 500: 'var(--color-primary-500)' } } } } };</script>
</head>

<body class="bg-slate-50">

    <!-- Molecule : Navbar Apprenant -->
    <header
        class="flex flex-wrap md:justify-start md:flex-nowrap z-50 w-full bg-white border-b border-slate-200 sticky top-0">
        <nav class="relative max-w-7xl w-full flex flex-wrap md:grid md:grid-cols-12 basis-full items-center px-4 md:px-6 mx-auto py-3"
            aria-label="Global">

            <!-- Logo -->
            <div class="md:col-span-3">
                <a class="flex items-center gap-2 group outline-none" href="#" aria-label="SoliQuiz Accueil">
                    <div
                        class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/10 transition-transform group-hover:scale-110">
                        <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                                class="text-primary-500">Quiz</span></span>
                        <span
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Apprenant</span>
                    </div>
                </a>
            </div>

            <!-- Navbar Center (Menu - Hidden on Mobile) -->
            <div class="hidden md:flex md:col-span-6 justify-center items-center gap-x-8">
                <a href="#" class="font-medium text-primary-500 focus:outline-none flex items-center gap-x-2"
                    aria-current="page">Dashboard</a>
                <a href="#"
                    class="font-medium text-slate-500 hover:text-slate-800 transition-colors focus:outline-none flex items-center gap-x-2">Bibliothèque</a>
                <a href="#"
                    class="font-medium text-slate-500 hover:text-slate-800 transition-colors focus:outline-none flex items-center gap-x-2">Progression</a>
            </div>

            <!-- User Avatar / Drodown -->
            <div class="flex items-center gap-x-3 md:gap-x-4 ms-auto md:col-span-3 justify-end relative">
                <button type="button"
                    class="flex items-center justify-center size-[38px] rounded-full border border-slate-200 bg-white hover:bg-slate-100 transition-colors">
                    <img class="inline-block size-[32px] rounded-full"
                        src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=facearea&facepad=2&w=300&h=300&q=80"
                        alt="Avatar">
                </button>
                <span class="hidden md:inline-block font-heading font-medium text-sm text-slate-800">Mehdi.B</span>
            </div>
        </nav>
    </header>

    <!-- Navigation Mobile (Bottom Nav - Only visible on Mobile) -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-50">
        <div class="flex justify-around items-center h-[72px] px-4 pb-safe">
            <a href="#" class="flex flex-col items-center justify-center text-primary-500 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center text-slate-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Library</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center text-slate-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Stats</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center text-slate-400 gap-1.5">
                <svg class="size-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest">Profil</span>
            </a>
        </div>
    </nav>

</body>

</html>
