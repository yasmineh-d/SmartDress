<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: KPI Card</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { semantic: { success: 'var(--color-success-500)', successLight: 'var(--color-success-100)' } } } } };</script>
</head>

<body class="bg-gray-50 flex justify-center items-center h-screen p-4">

    <!-- Molecule : KPI Card (Admin Dashboard) -->
    <div class="flex flex-col bg-white border border-slate-200 shadow-sm rounded-xl w-full max-w-xs">
        <div class="p-5 md:p-6">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Tests Actifs
                        Aujourd'hui</h3>
                    <!-- Atom: Stat -->
                    <div class="text-3xl font-bold font-heading text-slate-900">124</div>
                </div>

                <div
                    class="flex items-center justify-center p-3 rounded-xl bg-semantic-successLight text-semantic-success">
                    <svg class="shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        <path d="M12 9v1m0 4v1" />
                    </svg>
                </div>
            </div>

            <div class="mt-4 flex items-center gap-x-2">
                <!-- Atom: Badge -->
                <span
                    class="inline-flex items-center gap-x-1 py-0.5 px-2 rounded-md bg-semantic-successLight text-semantic-success text-xs font-medium">
                    <svg class="inline-block size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m5 12 7-7 7 7" />
                        <path d="M12 19V5" />
                    </svg>
                    12.5%
                </span>
                <span class="text-xs text-slate-500 font-medium">depuis le dernier mois</span>
            </div>
        </div>
    </div>

</body>

</html>
