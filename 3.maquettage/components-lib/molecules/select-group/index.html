<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Select Group</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-sm mx-auto">

    <!-- Molecule : Select Group -->
    <!-- Atoms : label, select -->
    <!-- Contexte : Formulaires de configuration -->

    <div class="flex flex-col gap-2">
        <!-- Atom: Label -->
        <label for="demo-select-group" class="text-sm font-semibold text-slate-700">Choisir une thématique</label>

        <div class="relative">
            <!-- Atom: Select -->
            <select id="demo-select-group"
                class="py-3 px-4 block w-full border-slate-200 rounded-xl text-sm border focus:border-primary-500 focus:ring-primary-500 outline-none bg-white shadow-sm appearance-none cursor-pointer">
                <option selected>Sélectionner...</option>
                <option>Frontend Development</option>
                <option>Backend PHP</option>
                <option>Gestion de base de données</option>
            </select>

            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
        </div>

        <p class="text-[11px] text-slate-400 italic">L'objectif pédagogique sera lié à ce choix.</p>
    </div>

</body>

</html>
