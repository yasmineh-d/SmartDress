<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécule: Editable Title</title>
    <link rel="stylesheet" href="../../../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10 max-w-xl mx-auto">

    <!-- Molecule : Editable Title -->
    <!-- Atoms : input (h1-style) -->
    <!-- Contexte : Éditeur QCM pour changer le titre en direct -->

    <div class="flex items-center gap-3 group">
        <div class="relative w-full">
            <input type="text" value="Évaluation PHP : Niveau Intermédiaire"
                class="w-full text-2xl sm:text-3xl font-heading font-bold text-slate-900 bg-transparent border-b-2 border-transparent focus:border-primary-500 hover:border-slate-200 outline-none transition-all py-1.5" />

            <!-- Tooltip/Affichage status -->
            <div class="absolute -top-6 left-0 opacity-0 group-hover:opacity-100 transition-opacity">
                <span
                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-white/80 px-1.5 py-0.5 rounded">Cliquer
                    pour éditer</span>
            </div>
        </div>

        <svg class="w-5 h-5 text-slate-300 group-hover:text-primary-400 transition-colors shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
    </div>

</body>

</html>
