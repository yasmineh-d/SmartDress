<!DOCTYPE html>
<html lang="fr" class="bg-slate-50 h-[100dvh]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoliQuiz - Créateur QCM</title>
    <link rel="stylesheet" href="../charte-graphique/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans'], heading: ['Outfit', 'sans'] }, colors: { primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' }, semantic: { success: 'var(--color-success-500)' } } } } };
    </script>
</head>

<body class="text-slate-800 flex flex-col h-full overflow-hidden">

    <!-- Header Editor -->
    <header class="w-full bg-white border-b border-slate-200 shrink-0 z-50 flexitems-center h-[60px]">
        <div class="max-w-[1600px] w-full mx-auto px-4 flex justify-between items-center h-full">
            <div class="flex items-center gap-4">
                <!-- Brand Logo (Shared) -->
                <a class="flex items-center gap-2 group outline-none" href="04-formateur-dashboard.html"
                    aria-label="Retour Dashboard">
                    <div
                        class="size-8 bg-primary-500 rounded-lg flex items-center justify-center shadow-lg shadow-primary-500/20 transition-transform group-hover:scale-105">
                        <svg class="text-white size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none hidden sm:flex">
                        <span class="text-xl font-heading font-bold text-slate-900 tracking-tight">Soli<span
                                class="text-primary-500">Quiz</span></span>
                        <span
                            class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] ml-0.5">Formateur</span>
                    </div>
                </a>
                <div class="h-6 w-px bg-slate-200"></div>
                <!-- Editable Title -->
                <input type="text"
                    class="text-lg font-bold font-heading text-slate-900 border-transparent hover:border-slate-300 focus:border-primary-500 focus:ring-primary-500 rounded bg-transparent px-2 py-1 outline-none transition-colors w-[250px] md:w-[400px]"
                    value="Nouveau QCM Algorithmique">
                <span
                    class="hidden md:inline-flex items-center gap-1.5 py-1 px-2 rounded bg-slate-100 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Brouillon</span>
            </div>

            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-500 hidden sm:block mr-2">Enregistré à 14:12</span>
                <button type="button"
                    class="py-1.5 px-3 inline-flex items-center gap-x-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-800 shadow-sm hover:bg-slate-50 transition-colors">Aperçu</button>
                <button type="button"
                    class="py-1.5 px-4 inline-flex items-center gap-x-2 text-xs font-semibold rounded-lg border border-transparent bg-primary-500 text-white shadow-sm hover:bg-primary-600 transition-colors">Publier</button>
            </div>
        </div>
    </header>

    <!-- App Layout Split -->
    <div class="flex flex-1 overflow-hidden max-w-[1600px] w-full mx-auto bg-white border-x border-slate-200 shadow-sm">

        <!-- Sidebar Paramètres Globaux -->
        <aside
            class="hidden lg:block w-[320px] bg-slate-50 border-r border-slate-200 overflow-y-auto shrink-0 z-10 p-6 space-y-8">
            <div>
                <h2
                    class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2 border-slate-200">
                    Paramètres du Test</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-slate-800">Catégorie Globale</label>
                        <select
                            class="py-2.5 px-3 block w-full border-slate-200 rounded-lg text-sm bg-white shadow-sm focus:border-primary-500 focus:ring-primary-500 outline-none transition-colors font-medium">
                            <option>Développement Back-End</option>
                            <option>Développement Front-End</option>
                        </select>
                    </div>
                </div>
            </div>

            <div>
                <h2
                    class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2 border-slate-200">
                    Conditions</h2>

                <div class="space-y-5">
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-800 font-semibold cursor-pointer">Temps limite (Global)</label>
                        <input type="checkbox" id="timer-switch"
                            class="relative w-[3.25rem] h-7 p-px bg-slate-200 border-transparent text-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:ring-primary-500 checked:bg-none checked:text-primary-500 checked:border-primary-500 focus:checked:border-primary-500 before:inline-block before:size-6 before:bg-white checked:before:bg-primary-200 before:translate-x-0 checked:before:translate-x-full before:rounded-full before:shadow before:transform before:ring-0 before:transition before:ease-in-out before:duration-200"
                            checked>
                    </div>
                    <div>
                        <input type="number"
                            class="py-2 px-3 block w-full border-slate-200 rounded-lg text-sm bg-white shadow-sm outline-none transition-colors"
                            value="20" placeholder="Minutes">
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-800 font-semibold cursor-pointer">Score passage /20</label>
                        <input type="number"
                            class="py-1 px-2 block w-[60px] text-center border-slate-200 rounded-md text-sm bg-white shadow-sm outline-none transition-colors"
                            value="10">
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace (Editor Flow) -->
        <main class="flex-1 overflow-y-auto bg-slate-100 p-4 md:p-8 relative">
            <div class="max-w-3xl mx-auto space-y-6 pb-[100px]">

                <!-- Skeleton/Card Question 1 (Rétrécie / Validée) -->
                <div
                    class="bg-white border shadow-sm border-slate-200 rounded-xl p-4 flex gap-4 items-start opacity-70 hover:opacity-100 transition-opacity cursor-pointer group/item">
                    <span
                        class="inline-flex size-[28px] bg-slate-200 text-slate-600 rounded-full items-center justify-center text-xs font-bold shrink-0">1</span>
                    <div class="flex-1 truncate pt-1">
                        <h4 class="text-sm font-semibold text-slate-800 truncate">Qu'est-ce qu'une fonction récursive ?
                        </h4>
                        <div class="text-xs text-slate-500 mt-1">Choix Multiple • 4 options</div>
                    </div>
                    <div class="flex items-center gap-2 opacity-0 group-hover/item:opacity-100 transition-opacity">
                        <button class="text-primary-500 text-sm font-medium hover:underline p-1">Éditer</button>
                        <button class="text-red-400 hover:text-red-500 p-1" data-hs-overlay="#hs-modal-delete-question">
                            <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18" />
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                            </svg>
                        </button>
                    </div>
                    <!-- Drag Handle indicator -->
                    <div class="h-full flex items-center px-2 cursor-grab text-slate-300 hover:text-slate-500">
                        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="12" r="1" />
                            <circle cx="9" cy="5" r="1" />
                            <circle cx="9" cy="19" r="1" />
                            <circle cx="15" cy="12" r="1" />
                            <circle cx="15" cy="5" r="1" />
                            <circle cx="15" cy="19" r="1" />
                        </svg>
                    </div>
                </div>

                <!-- Card Question 2 (Editeur Actif, type "Molecule Question Card") -->
                <article
                    class="bg-white border shadow-md border-primary-100 rounded-2xl w-full flex flex-col ring-2 ring-primary-500/20 ring-offset-4 ring-offset-slate-100">
                    <header
                        class="border-b border-primary-100 py-3 px-6 flex justify-between items-center bg-primary-50/30 rounded-t-2xl">
                        <div class="flex items-center gap-3">
                            <span
                                class="inline-flex size-[28px] bg-primary-500 text-white shadow-sm shadow-primary-500/50 rounded-full items-center justify-center text-xs font-bold">2</span>
                            <span class="text-sm font-bold text-slate-800 uppercase tracking-wider">Édition en
                                cours</span>
                        </div>
                        <button class="text-slate-400 hover:text-red-500 transition-colors" title="Supprimer"
                            data-hs-overlay="#hs-modal-delete-question">
                            <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18" />
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                            </svg>
                        </button>
                    </header>

                    <div class="p-6 space-y-6">
                        <!-- Consigne -->
                        <div>
                            <textarea
                                class="w-full py-3 px-4 block border-slate-200 rounded-xl text-lg shadow-sm focus:border-primary-500 focus:ring-primary-500 transition-colors outline-none font-medium placeholder-slate-400"
                                rows="2" placeholder="Saisissez l'énoncé de la question..."></textarea>
                        </div>

                        <!-- Builder Réponses -->
                        <div class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Réponses
                                    (Cocher la bonne)</span>
                                <select
                                    class="py-1 px-2 border-slate-200 rounded-md text-xs border shadow-sm focus:ring-primary-500 font-medium bg-white cursor-pointer outline-none">
                                    <option selected>Type : Choix Unique</option>
                                    <option>Type : Choix Multiple</option>
                                    <option>Type : Vrai/Faux</option>
                                </select>
                            </div>

                            <!-- Opt 1 Vierge -->
                            <div
                                class="flex items-center gap-3 bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm focus-within:ring-2 focus-within:border-primary-500 focus-within:ring-primary-100 transition-all">
                                <input type="radio" name="temp-ans"
                                    class="shrink-0 size-4 border-slate-300 rounded-full text-primary-500 focus:ring-primary-500 cursor-pointer ml-1">
                                <input type="text" placeholder="Option de réponse 1"
                                    class="block w-full text-sm font-medium text-slate-800 outline-none pb-0.5 border-b border-transparent focus:border-slate-300 placeholder-slate-400 bg-transparent">
                                <button class="text-slate-300 hover:text-slate-500 p-1"><svg class="size-4"
                                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M18 6 6 18" />
                                        <path d="m6 6 12 12" />
                                    </svg></button>
                            </div>
                            <!-- Opt 2 Vierge -->
                            <div
                                class="flex items-center gap-3 bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm focus-within:ring-2 focus-within:border-primary-500 focus-within:ring-primary-100 transition-all">
                                <input type="radio" name="temp-ans"
                                    class="shrink-0 size-4 border-slate-300 rounded-full text-primary-500 focus:ring-primary-500 cursor-pointer ml-1">
                                <input type="text" placeholder="Option de réponse 2"
                                    class="block w-full text-sm font-medium text-slate-800 outline-none pb-0.5 border-b border-transparent focus:border-slate-300 placeholder-slate-400 bg-transparent">
                                <button class="text-slate-300 hover:text-slate-500 p-1"><svg class="size-4"
                                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M18 6 6 18" />
                                        <path d="m6 6 12 12" />
                                    </svg></button>
                            </div>

                            <button type="button"
                                class="mt-2 py-2 px-3 inline-flex items-center gap-x-2 text-xs font-bold rounded-lg text-primary-600 hover:bg-primary-50 transition-colors w-full justify-center border border-dashed border-primary-200">
                                <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                    <path d="M5 12h14" />
                                    <path d="M12 5v14" />
                                </svg>
                                Ajouter une option
                            </button>
                        </div>

                        <!-- Feedback -->
                        <div>
                            <textarea
                                class="w-full py-2.5 px-3 block border-slate-200 rounded-xl text-sm shadow-sm focus:border-slate-300 outline-none transition-colors placeholder-slate-400 font-medium"
                                rows="2" placeholder="Feedback Pédagogique après correction (Optionnel)..."></textarea>
                        </div>
                    </div>
                </article>

                <!-- Floating Bottom Add Button (dans le flow) -->
                <div class="flex justify-center pt-8">
                    <button type="button"
                        class="py-3 px-6 shadow-md inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-full border border-slate-200 bg-white text-slate-700 hover:bg-primary-50 focus:outline-none transition-all hover:-translate-y-1">
                        <svg class="size-4 shrink-0 text-primary-500" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round">
                            <path d="M5 12h14" />
                            <path d="M12 5v14" />
                        </svg>
                        Nouvelle Question
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Delete Question Confirmation -->
    <div id="hs-modal-delete-question"
        class="hs-overlay hidden size-full fixed top-0 start-0 z-[70] overflow-x-hidden overflow-y-auto pointer-events-none">
        <div
            class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-sm sm:w-full m-3 sm:mx-auto">
            <div class="bg-white border border-slate-200 shadow-2xl rounded-3xl pointer-events-auto p-8 text-center">
                <div class="size-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg class="size-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18" />
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    </svg>
                </div>
                <h3 class="font-heading font-black text-slate-900 uppercase italic tracking-tight text-xl mb-4">
                    Supprimer la question</h3>
                <p class="text-slate-500 text-sm mb-8 leading-relaxed">Voulez-vous vraiment retirer cette question du
                    QCM ?</p>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button"
                        class="py-3 px-4 font-bold text-xs text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition-all uppercase tracking-widest"
                        data-hs-overlay="#hs-modal-delete-question">Annuler</button>
                    <button type="button"
                        class="py-3 px-4 font-black text-xs text-white bg-red-500 rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/20 transition-all uppercase tracking-widest">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Preline UI Script -->
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>

    <!-- Interactions Basiques JS pour la Maquette -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainWorkSpace = document.querySelector('.max-w-3xl.mx-auto');

            // Corriger l'attribut type des boutons de suppression existants pour éviter qu'ils ne rechargent la page
            document.querySelectorAll('button.text-slate-300:not([type])').forEach(btn => btn.type = 'button');

            // Event Delegation
            mainWorkSpace.addEventListener('click', (e) => {

                // 1. Bouton "Ajouter une option"
                const addOptBtn = e.target.closest('button.py-2.px-3.text-primary-600');
                if (addOptBtn && addOptBtn.textContent.includes('Ajouter une option')) {
                    const optionsContainer = addOptBtn.parentElement;
                    const typeSelect = optionsContainer.querySelector('select');
                    const isMultiple = typeSelect && typeSelect.value.includes('Multiple');
                    const inputType = isMultiple ? 'checkbox' : 'radio';
                    const roundClass = isMultiple ? 'rounded' : 'rounded-full';
                    const groupName = "ans-" + Math.random().toString(36).substr(2, 9);

                    const newRow = document.createElement('div');
                    newRow.className = "flex items-center gap-3 bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm focus-within:ring-2 focus-within:border-primary-500 focus-within:ring-primary-100 transition-all";
                    newRow.innerHTML = `
                        <input type="${inputType}" name="${groupName}" class="shrink-0 size-4 border-slate-300 ${roundClass} text-primary-500 focus:ring-primary-500 cursor-pointer ml-1">
                        <input type="text" placeholder="Nouvelle option" class="block w-full text-sm font-medium text-slate-800 outline-none pb-0.5 border-b border-transparent focus:border-slate-300 placeholder-slate-400 bg-transparent">
                        <button type="button" class="text-slate-300 hover:text-slate-500 p-1 remove-opt-btn">
                            <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 6 6 18" />
                                <path d="m6 6 12 12" />
                            </svg>
                        </button>
                    `;
                    // Synchronize radio name if it's radio, so they share the same group
                    if (inputType === 'radio') {
                        const existingRadios = optionsContainer.querySelectorAll('input[type="radio"]');
                        if (existingRadios.length > 0) {
                            newRow.querySelector('input').name = existingRadios[0].name;
                        }
                    }

                    optionsContainer.insertBefore(newRow, addOptBtn);
                }

                // 2. Bouton "Supprimer option"
                const removeOptBtn = e.target.closest('button.text-slate-300.hover\\:text-slate-500, .remove-opt-btn');
                if (removeOptBtn && removeOptBtn.parentElement.classList.contains('flex')) {
                    const row = removeOptBtn.parentElement;
                    row.remove();
                }

                // 3. Bouton "Nouvelle Question"
                const newQuestionBtn = e.target.closest('button.shadow-md.rounded-full');
                if (newQuestionBtn && newQuestionBtn.textContent.includes('Nouvelle Question')) {
                    const baseArticle = document.querySelector('article.bg-white.border.shadow-md.border-primary-100');
                    if (baseArticle) {
                        const clone = baseArticle.cloneNode(true);

                        // Nettoyer les champs de saisie
                        clone.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');

                        // Mettre à jour le numéro de la question (approximatif pour la maquette)
                        const count = mainWorkSpace.querySelectorAll('article').length + 2;
                        const badge = clone.querySelector('span.bg-primary-500.text-white');
                        if (badge) badge.textContent = count;

                        // Grouper les radios pour la nouvelle carte
                        const radioName = "ans-" + Math.random().toString(36).substr(2, 9);
                        clone.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => {
                            el.checked = false;
                            el.name = radioName;
                        });

                        mainWorkSpace.insertBefore(clone, newQuestionBtn.parentElement);
                    }
                }
            });

            // 4. Changement du Select (Choix Unique / Multiple)
            mainWorkSpace.addEventListener('change', (e) => {
                if (e.target.tagName === 'SELECT') {
                    const optionsContainer = e.target.closest('.space-y-3');
                    if (optionsContainer) {
                        const isMultiple = e.target.value.includes('Multiple');
                        const isTrueFalse = e.target.value.includes('Vrai/Faux');
                        const inputs = optionsContainer.querySelectorAll('input[type="radio"], input[type="checkbox"]');

                        inputs.forEach(input => {
                            input.type = isMultiple ? "checkbox" : "radio";
                            if (isMultiple) {
                                input.classList.remove('rounded-full');
                                input.classList.add('rounded');
                            } else {
                                input.classList.remove('rounded');
                                input.classList.add('rounded-full');
                            }
                        });

                        // Simulation de la bascule Vrai/Faux
                        if (isTrueFalse) {
                            const rows = optionsContainer.querySelectorAll('.flex.items-center.gap-3.bg-white');
                            if (rows.length > 2) {
                                for (let i = 2; i < rows.length; i++) rows[i].remove();
                            }
                            const textInputs = optionsContainer.querySelectorAll('input[type="text"]');
                            if (textInputs[0]) textInputs[0].value = "Vrai";
                            if (textInputs[1]) textInputs[1].value = "Faux";
                        }
                    }
                }
            });
        });
    </script>
</body>

</html>
