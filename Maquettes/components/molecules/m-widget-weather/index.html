<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite min-h-screen flex items-center justify-center p-6 font-body text-bark">

    <!-- Molécule : m-widget-weather -->
    <div
        class="flex items-center gap-5 bg-white/70 backdrop-blur-xl px-8 py-5 rounded-[2rem] border border-tan/20 shadow-xl shadow-bark/5 ring-1 ring-tan/5">
        <div class="w-14 h-14 bg-cream flex items-center justify-center rounded-2xl shadow-inner border border-tan/10">
            <span class="text-3xl">⛅</span>
        </div>
        <div>
            <p class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] mb-1">Météo / Casablanca</p>
            <p class="text-2xl font-display font-semibold text-bark tracking-tight">24°C <span
                    class="text-moss italic font-medium ml-2">Ensoleillé</span></p>
        </div>
    </div>

</body>

</html>
