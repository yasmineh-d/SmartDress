<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite min-h-screen flex items-center justify-center p-6 font-body text-bark overflow-hidden relative">
    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_right,rgba(136,144,99,0.1),transparent_50%),radial-gradient(circle_at_bottom_left,rgba(207,187,153,0.15),transparent_50%)]"></div>

    <!-- Molécule : m-hero-splash -->
    <section class="relative flex flex-col items-center text-center max-w-2xl space-y-10 z-10">

        <!-- Atom : a-logo (intégré) -->
        <a href="#" class="inline-flex items-center group transition-transform hover:scale-[1.02]">
            <div style="font-family: 'Cormorant Garamond', serif;" class="text-7xl md:text-8xl tracking-tight select-none flex items-baseline">
                <span style="font-weight: 400; color: #5C4A35;">Smart</span>
                <span style="font-weight: 600; font-style: italic; color: #889063; margin-left: -0.02em;">Dress</span>
            </div>
        </a>

        <!-- Atom : a-title-h1 (intégré) -->
        <h1 class="text-4xl md:text-5xl font-display font-medium text-bark tracking-tight leading-[1.1]">
            Votre garde-robe devient <br><span
                class="italic text-moss font-semibold">vraiment intelligente</span>
        </h1>

        <!-- Atom : a-btn-primary (intégré) -->
        <button
            class="px-12 py-5 bg-moss text-white font-body font-medium text-sm tracking-[0.2em] uppercase rounded-full shadow-2xl shadow-moss/30 hover:bg-bark hover:scale-105 transition-all active:scale-95">
            Commencer l'expérience
        </button>

    </section>

</body>

</html>
