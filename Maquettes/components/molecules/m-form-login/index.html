<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite min-h-screen flex items-center justify-center p-6 font-body text-bark">

    <!-- Molécule : m-auth-card (Login + Register Combined) -->
    <div class="w-full max-w-md bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-bark/5 border border-tan/10 space-y-8" x-data="{ tab: 'login' }">

        <div class="space-y-3 text-center">
            <h2 class="text-4xl font-display font-medium text-bark italic leading-tight">Bienvenue <em>chez vous</em></h2>
            <p class="text-bark/50 text-sm font-light">Accédez à votre garde-robe digitale intelligente.</p>
        </div>

        <!-- Tab System -->
        <div class="flex p-1 bg-offwhite rounded-2xl border border-tan/5">
            <button @click="tab = 'login'"
                :class="tab === 'login' ? 'bg-white text-bark shadow-sm' : 'text-tan hover:text-bark'"
                class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all">
                Connexion
            </button>
            <button @click="tab = 'register'"
                :class="tab === 'register' ? 'bg-white text-bark shadow-sm' : 'text-tan hover:text-bark'"
                class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all">
                Inscription
            </button>
        </div>

        <!-- Login Form -->
        <form x-show="tab === 'login'" class="space-y-5" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Email</label>
                <input type="email" placeholder="nom@exemple.com"
                    class="w-full px-5 py-4 bg-cream/30 border border-tan/20 rounded-2xl focus:border-bark focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Mot de passe</label>
                    <a href="#" class="text-[10px] font-bold text-bark hover:text-moss uppercase tracking-widest transition-colors">Oublié ?</a>
                </div>
                <input type="password" placeholder="••••••••"
                    class="w-full px-5 py-4 bg-cream/30 border border-tan/20 rounded-2xl focus:border-bark focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
            </div>

            <button
                class="w-full py-4 bg-bark text-white font-body font-bold text-[10px] tracking-[0.2em] uppercase rounded-full shadow-lg shadow-bark/20 hover:bg-[#4A3B2A] transition-all transform hover:-translate-y-1 mt-4">
                Se connecter
            </button>
        </form>

        <!-- Register Form -->
        <form x-show="tab === 'register'" class="space-y-5" style="display: none;" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Nom complet</label>
                <input type="text" placeholder="Jean Dupont"
                    class="w-full px-5 py-4 bg-cream/30 border border-tan/20 rounded-2xl focus:border-bark focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Email</label>
                <input type="email" placeholder="nom@exemple.com"
                    class="w-full px-5 py-4 bg-cream/30 border border-tan/20 rounded-2xl focus:border-bark focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Mot de passe</label>
                <input type="password" placeholder="••••••••"
                    class="w-full px-5 py-4 bg-cream/30 border border-tan/20 rounded-2xl focus:border-bark focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
            </div>

            <button
                class="w-full py-4 bg-bark text-white font-body font-bold text-[10px] tracking-[0.2em] uppercase rounded-full shadow-lg shadow-bark/20 hover:bg-[#4A3B2A] transition-all transform hover:-translate-y-1 mt-4">
                Créer mon compte
            </button>
        </form>

        <div class="relative py-2">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-tan/10"></div>
            </div>
            <div class="relative flex justify-center text-[10px] uppercase font-bold tracking-[0.2em]"><span class="bg-white px-4 text-tan/60">Ou continuer avec</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button
                class="flex items-center justify-center py-4 border border-tan/20 rounded-2xl hover:bg-cream/20 transition-all group">
                <span class="text-[10px] font-bold text-tan uppercase tracking-widest group-hover:text-bark">Google</span>
            </button>
            <button
                class="flex items-center justify-center py-4 border border-tan/20 rounded-2xl hover:bg-cream/20 transition-all group">
                <span class="text-[10px] font-bold text-tan uppercase tracking-widest group-hover:text-bark">Apple</span>
            </button>
        </div>
    </div>

    <!-- Alpine.js for Tab functionality -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</body>

</html>
