<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                        deeptan: '#B8A07E',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite min-h-screen flex items-center justify-center p-6 font-body text-bark">

    <!-- Molécule : m-card-suggestion -->
    <div
        class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl shadow-bark/5 overflow-hidden border border-tan/20">

        <!-- Header Image Area -->
        <div class="relative h-80 bg-cream flex items-center justify-center p-8 overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(207,187,153,0.15)_0%,transparent_70%)]"></div>
            <div class="absolute top-6 left-6">
                <span
                    class="px-4 py-1.5 bg-white/90 backdrop-blur-sm text-moss text-[10px] font-bold rounded-full shadow-sm tracking-[0.1em] uppercase">Conseillé</span>
            </div>
            <!-- Simulation d'une tenue suggérée -->
            <div class="relative flex flex-col items-center gap-4">
                <div
                    class="w-28 h-28 bg-white rounded-2xl flex items-center justify-center text-tan font-bold shadow-sm border border-tan/10 text-xs tracking-widest">
                    HAUT</div>
                <div
                    class="w-28 h-36 bg-bone/40 rounded-2xl flex items-center justify-center text-deeptan font-bold shadow-sm border border-tan/10 text-xs tracking-widest">
                    BAS</div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="p-8 space-y-6">
            <div class="space-y-3">
                <h2 class="text-3xl font-display font-medium text-bark leading-tight italic">Look Casual <em>Chic</em></h2>
                <p class="text-bark/60 text-sm leading-relaxed font-light">Parfait pour une journée de travail avec une
                    température de 18°C.</p>
            </div>

            <div class="flex flex-col gap-3">
                <!-- atom : a-btn-primary -->
                <button
                    class="w-full py-4 bg-moss text-white font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full shadow-lg shadow-moss/20 hover:bg-bark transition-all transform hover:-translate-y-1">
                    Valider cette tenue
                </button>
                <!-- atom : a-btn-ghost -->
                <button
                    class="w-full py-4 text-bark/50 font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full hover:bg-bone/30 transition-colors">
                    Autre idée ?
                </button>
            </div>
        </div>
    </div>

</body>

</html>
