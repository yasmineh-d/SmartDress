<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../assets/css/style-landing.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tan: '#CFBB99', bone: '#E5D7C4', moss: '#889063', deeptan: '#B8A07E', cream: '#F5EEE4', bark: '#5C4A35', offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'], body: ['"DM Sans"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-body bg-offwhite text-bark overflow-x-hidden" x-data="{ mobileMenuOpen: false, scrolled: false }" @scroll.window="scrolled = (window.pageYOffset > 20)">
<!-- CTA SECTION -->
    <section id="contact" class="sd-cta">
        <div class="sd-cta-deco">"</div>
        <div class="max-w-screen-md mx-auto px-6 text-center relative z-10">
            <span class="sd-tag sd-tag--moss">Rejoignez SmartDress</span>
            <h2 class="sd-cta-title">
                Fini le stress du matin.<br>
                Habillez-vous avec <em>intelligence</em>.
            </h2>
            <p class="sd-cta-desc">Rejoignez des milliers d'utilisateurs qui ont transformé leur routine matinale grâce
                à SmartDress.</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="../../../pages/auth.html" class="sd-btn-primary sd-btn-lg">Créer un compte gratuit</a>
                <a href="#features" class="sd-btn-ghost sd-btn-lg">En savoir plus</a>
            </div>
        </div>
    </section>


    
    <script>
        document.addEventListener('alpine:init', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.observe-me').forEach(el => observer.observe(el));

            const heroTitle = document.querySelector('.sd-hero-title');
            if (heroTitle) heroTitle.style.animationPlayState = 'running';
        });

        document.querySelectorAll('.sd-btn-primary').forEach(btn => {
            btn.addEventListener('click', function (e) {
                const rect = this.getBoundingClientRect();
                const ripple = document.createElement('span');
                const size = Math.max(rect.width, rect.height);
                ripple.style.cssText = "position: absolute; width: " + size + "px; height: " + size + "px; top: " + (e.clientY - rect.top - size / 2) + "px; left: " + (e.clientX - rect.left - size / 2) + "px; background: rgba(255,255,255,0.2); border-radius: 50%; transform: scale(0); animation: ripple 0.5s ease-out; pointer-events: none;";
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);
            });
        });
    </script>
</body>
</html>
