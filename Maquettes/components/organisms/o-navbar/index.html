<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../assets/css/style-landing.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tan: '#CFBB99', bone: '#E5D7C4', moss: '#889063', deeptan: '#B8A07E', cream: '#F5EEE4', bark: '#5C4A35', offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'], body: ['"DM Sans"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-body bg-offwhite text-bark overflow-x-hidden" x-data="{ mobileMenuOpen: false, scrolled: false }" @scroll.window="scrolled = (window.pageYOffset > 20)">
<!-- NAVBAR -->
    <header id="navbar" class="sd-navbar" :class="{ 'scrolled': scrolled }">
        <div class="max-w-screen-xl mx-auto px-6 lg:px-12 flex items-center justify-between h-full">
            <a href="#" class="sd-logo">Smart<span>Dress</span></a>

            <nav class="hidden lg:flex items-center gap-8">
                <a href="#features" class="sd-navlink">Fonctionnalités</a>
                <a href="#how" class="sd-navlink">Comment ça marche</a>
                <a href="#trust" class="sd-navlink">Témoignages</a>
                <a href="#contact" class="sd-navlink">Contact</a>
            </nav>

            <div class="hidden lg:flex items-center gap-3">
                <a href="../../../pages/auth.html" class="sd-btn-ghost">Se connecter</a>
                <a href="../../../pages/auth.html" class="sd-btn-primary">Commencer</a>
            </div>

            <!-- Mobile hamburger -->
            <button type="button" class="lg:hidden sd-hamburger" @click="mobileMenuOpen = !mobileMenuOpen"
                :aria-expanded="mobileMenuOpen">
                <span class="sr-only">Menu</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M3 12h18M3 6h18M3 18h18" />
                    <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M6 18L18 6M6 6l12 12" style="display: none;" />
                </svg>
            </button>
        </div>

        <!-- Mobile menu -->
        <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
            class="lg:hidden bg-offwhite border-t border-tan/30 shadow-xl" style="display: none;">
            <div class="px-6 py-4 flex flex-col gap-3">
                <a href="#features" class="sd-navlink" @click="mobileMenuOpen = false">Fonctionnalités</a>
                <a href="#how" class="sd-navlink" @click="mobileMenuOpen = false">Comment ça marche</a>
                <a href="#trust" class="sd-navlink" @click="mobileMenuOpen = false">Témoignages</a>
                <a href="#contact" class="sd-navlink" @click="mobileMenuOpen = false">Contact</a>
                <hr class="border-tan/30 my-1" />
                <a href="../../../pages/auth.html" class="sd-btn-ghost text-center" @click="mobileMenuOpen = false">Se
                    connecter</a>
                <a href="../../../pages/auth.html" class="sd-btn-primary text-center"
                    @click="mobileMenuOpen = false">Commencer gratuitement</a>
            </div>
        </div>
    </header>


    
    <script>
        document.addEventListener('alpine:init', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.observe-me').forEach(el => observer.observe(el));

            const heroTitle = document.querySelector('.sd-hero-title');
            if (heroTitle) heroTitle.style.animationPlayState = 'running';
        });

        document.querySelectorAll('.sd-btn-primary').forEach(btn => {
            btn.addEventListener('click', function (e) {
                const rect = this.getBoundingClientRect();
                const ripple = document.createElement('span');
                const size = Math.max(rect.width, rect.height);
                ripple.style.cssText = "position: absolute; width: " + size + "px; height: " + size + "px; top: " + (e.clientY - rect.top - size / 2) + "px; left: " + (e.clientX - rect.left - size / 2) + "px; background: rgba(255,255,255,0.2); border-radius: 50%; transform: scale(0); animation: ripple 0.5s ease-out; pointer-events: none;";
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);
            });
        });
    </script>
</body>
</html>
