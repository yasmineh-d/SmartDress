<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../assets/css/style-landing.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tan: '#CFBB99', bone: '#E5D7C4', moss: '#889063', deeptan: '#B8A07E', cream: '#F5EEE4', bark: '#5C4A35', offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'], body: ['"DM Sans"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-body bg-offwhite text-bark overflow-x-hidden" x-data="{ scrolled: false }">
    <!-- NAVBAR ONLY -->
    <header class="sd-navbar !static shadow-none border-b border-tan/20">
        <div class="max-w-screen-xl mx-auto px-6 lg:px-12 flex items-center justify-between h-full">
            <a href="#" class="sd-logo">Smart<span>Dress</span></a>

            <nav class="hidden lg:flex items-center gap-10">
                <a href="#" class="sd-navlink !opacity-100 !tracking-[0.2em] font-bold">FONCTIONNALITÉS</a>
                <a href="#" class="sd-navlink !opacity-100 !tracking-[0.2em] font-bold">COMMENT ÇA MARCHE</a>
                <a href="#" class="sd-navlink !opacity-100 !tracking-[0.2em] font-bold">TÉMOIGNAGES</a>
                <a href="#" class="sd-navlink !opacity-100 !tracking-[0.2em] font-bold">CONTACT</a>
            </nav>

            <div class="hidden lg:flex items-center gap-4">
                <a href="#" class="sd-btn-ghost px-8 border-tan/40 text-[11px]">SE CONNECTER</a>
                <a href="#" class="sd-btn-primary px-10 text-[11px] bg-moss">COMMENCER</a>
            </div>
        </div>
    </header>
</body>
</html>
