<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        accent: { 500: 'hsl(15, 80%, 65%)' },
                        slate: { 50: 'hsl(220, 15%, 98%)', 100: 'hsl(220, 15%, 95%)', 200: 'hsl(220, 15%, 90%)', 500: 'hsl(220, 15%, 50%)', 600: 'hsl(220, 15%, 40%)', 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../../assets/css/charte.css">
</head>
<body class="bg-slate-100 font-body text-slate-900 p-6">
    <div class="max-w-md mx-auto space-y-8">
        <!-- Header / Top Bar -->
        <header class="bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-4 rounded-3xl shadow-sm">
            <div class="flex items-center justify-between">
                <button class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
                <h1 class="text-xl font-heading font-bold text-slate-900">Tableau de Bord</h1>
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-coral-500 p-[2px]">
                    <div class="w-full h-full bg-white rounded-[10px] flex items-center justify-center overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=User&background=3b4cc0&color=fff" alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <!-- Weather Widget -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-5">
            <div class="w-14 h-14 bg-orange-100 flex items-center justify-center rounded-2xl text-3xl">☀️</div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Météo / Casablanca</p>
                <p class="text-2xl font-heading font-bold text-slate-900">24°C <span class="text-slate-400 font-medium text-lg ml-1">Ensoleillé</span></p>
            </div>
        </div>

        <!-- Suggestion Card -->
        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-indigo-100/50 overflow-hidden border border-white">
            <div class="relative h-64 bg-slate-50 flex items-center justify-center p-8">
                <div class="absolute top-6 left-6">
                    <span class="px-4 py-1.5 bg-primary-500 text-white text-[10px] font-bold rounded-full shadow-lg shadow-primary-500/20 tracking-wider">TENUE DU JOUR</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-24 h-24 bg-indigo-50 rounded-2xl border-2 border-white shadow-sm flex items-center justify-center flex-col">
                        <span class="text-2xl mb-1">👕</span>
                        <span class="text-[8px] font-bold text-indigo-400 uppercase tracking-widest text-center px-1">T-Shirt Blanc</span>
                    </div>
                    <div class="w-24 h-24 bg-slate-50 rounded-2xl border-2 border-white shadow-sm flex items-center justify-center flex-col">
                        <span class="text-2xl mb-1">👖</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-center px-1">Jean Slim Bleu</span>
                    </div>
                </div>
            </div>
            <div class="p-8 space-y-4">
                <h2 class="text-2xl font-heading font-bold text-slate-900 leading-tight">Casual Moderne</h2>
                <p class="text-slate-500 text-sm leading-relaxed">Cette tenue est parfaite pour votre planning d'aujourd'hui. Légère et stylée.</p>
                <button class="w-full py-4 bg-primary-500 text-white font-heading font-bold rounded-2xl shadow-xl shadow-primary-500/20 hover:bg-primary-700 transition-all">
                    Valider cette tenue
                </button>
            </div>
        </div>

        <!-- Quick Navigation -->
        <div class="grid grid-cols-2 gap-4">
            <button class="p-6 bg-white rounded-3xl border border-slate-100 flex flex-col items-center gap-3 hover:bg-slate-50 transition-colors">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-xl flex items-center justify-center text-2xl">🧥</div>
                <span class="text-sm font-bold text-slate-700">Dressing</span>
            </button>
            <button class="p-6 bg-white rounded-3xl border border-slate-100 flex flex-col items-center gap-3 hover:bg-slate-50 transition-colors">
                <div class="w-12 h-12 bg-coral-50 text-coral-500 rounded-xl flex items-center justify-center text-2xl">⭐</div>
                <span class="text-sm font-bold text-slate-700">Favoris</span>
            </button>
        </div>
    </div>
</body>
</html>
