<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-offwhite font-body text-bark p-6">
    <div class="max-w-md mx-auto space-y-8">
        <!-- Header / Top Bar -->
        <header class="bg-white/80 backdrop-blur-xl border border-tan/10 px-6 py-4 rounded-[2rem] shadow-sm">
            <div class="flex items-center justify-between">
                <button class="w-10 h-10 flex items-center justify-center bg-cream/50 rounded-xl hover:bg-cream transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-bark/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
                <h1 class="text-xl font-display font-medium text-bark italic">Tableau de Bord</h1>
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-tan to-moss p-[2px]">
                    <div class="w-full h-full bg-white rounded-[10px] flex items-center justify-center overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=User&background=889063&color=fff" alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <!-- Weather Widget -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-tan/10 flex items-center gap-5">
            <div class="w-14 h-14 bg-cream flex items-center justify-center rounded-2xl text-2xl shadow-inner border border-tan/10">⛅</div>
            <div>
                <p class="text-[10px] font-bold text-tan uppercase tracking-[0.2em]">Météo / Casablanca</p>
                <p class="text-2xl font-display font-semibold text-bark tracking-tight">24°C <span class="text-moss italic font-medium ml-2">Ensoleillé</span></p>
            </div>
        </div>

        <!-- Suggestion Card -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-bark/5 overflow-hidden border border-tan/10">
            <div class="relative h-64 bg-cream/50 flex items-center justify-center p-8 overflow-hidden">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(136,144,99,0.05)_0%,transparent_70%)]"></div>
                <div class="absolute top-6 left-6">
                    <span class="px-4 py-1.5 bg-moss text-white text-[10px] font-bold rounded-full shadow-lg shadow-moss/20 tracking-widest uppercase">Tenue du jour</span>
                </div>
                <div class="relative flex items-center gap-4">
                    <div class="w-24 h-24 bg-white rounded-2xl border border-tan/10 shadow-sm flex items-center justify-center flex-col">
                        <span class="text-2xl mb-1">👕</span>
                        <span class="text-[8px] font-bold text-tan uppercase tracking-widest text-center px-1">T-Shirt Blanc</span>
                    </div>
                    <div class="w-24 h-24 bg-bone/40 rounded-2xl border border-tan/10 shadow-sm flex items-center justify-center flex-col">
                        <span class="text-2xl mb-1">👖</span>
                        <span class="text-[8px] font-bold text-bark/40 uppercase tracking-widest text-center px-1">Jean Slim Bleu</span>
                    </div>
                </div>
            </div>
            <div class="p-8 space-y-5">
                <div class="space-y-2">
                    <h2 class="text-2xl font-display font-medium text-bark leading-tight italic">Look Casual <em>Moderne</em></h2>
                    <p class="text-bark/50 text-sm leading-relaxed font-light">Cette tenue est parfaite pour votre planning d'aujourd'hui. Légère et stylée.</p>
                </div>
                <button class="w-full py-4 bg-moss text-white font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full shadow-lg shadow-moss/20 hover:bg-bark transition-all transform hover:-translate-y-1">
                    Valider cette tenue
                </button>
            </div>
        </div>

        <!-- Quick Navigation -->
        <div class="grid grid-cols-2 gap-4">
            <button class="p-6 bg-white rounded-3xl border border-tan/10 flex flex-col items-center gap-3 hover:bg-cream/30 transition-all group">
                <div class="w-14 h-14 bg-cream text-tan rounded-2xl flex items-center justify-center text-3xl group-hover:bg-moss group-hover:text-white transition-colors">🧥</div>
                <span class="text-[10px] font-bold text-bark uppercase tracking-widest">Dressing</span>
            </button>
            <button class="p-6 bg-white rounded-3xl border border-tan/10 flex flex-col items-center gap-3 hover:bg-cream/30 transition-all group">
                <div class="w-14 h-14 bg-cream text-tan rounded-2xl flex items-center justify-center text-3xl group-hover:bg-moss group-hover:text-white transition-colors">⭐</div>
                <span class="text-[10px] font-bold text-bark uppercase tracking-widest">Favoris</span>
            </button>
        </div>
    </div>
</body>
</html>
