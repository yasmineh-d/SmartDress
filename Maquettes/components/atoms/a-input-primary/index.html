<!DOCTYPE html>
<html lang="fr text-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="p-10 flex flex-col gap-6 items-center justify-center min-h-screen bg-offwhite font-body">

    <!-- Prototype de l'Atome : a-input-primary -->
    <div class="w-full max-w-sm space-y-2">
        <label class="text-[10px] font-bold text-tan uppercase tracking-widest ml-4">Nom d'utilisateur</label>
        <input type="text" placeholder="Entrez votre nom..." 
            class="w-full px-6 py-4 bg-white border border-tan/10 rounded-[20px] outline-none focus:border-moss transition-all text-bark placeholder:text-tan/50 shadow-sm">
    </div>

</body>
</html>
