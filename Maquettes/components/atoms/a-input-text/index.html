<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)' },
                        slate: { 500: 'hsl(220, 15%, 50%)', 900: 'hsl(220, 15%, 10%)' }
                    }
                }
            }
        }
    </script>
</head>

<body class="p-10 flex items-center justify-center min-h-screen bg-slate-50">

    <!-- Prototype de l'Atome : a-input-text -->
    <div class="w-full max-w-sm">
        <label for="input-1" class="block text-sm font-semibold text-slate-500 mb-2">Adresse Email</label>
        <input type="email" id="input-1" placeholder="votre@email.com"
            class="w-full px-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-primary-500 focus:outline-none transition-all placeholder:text-slate-300">
    </div>

</body>

</html>
