    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-100">
        <div class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-10">
            <h2 id="component-title" class="text-sm font-bold text-slate-800 uppercase tracking-wide">Sélectionnez un composant</h2>
            <div class="flex gap-4 items-center">
                <div class="flex bg-slate-100 rounded-xl p-1">
                    <button onclick="resizeIframe('100%')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Desktop</button>
                    <button onclick="resizeIframe('375px')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Mobile</button>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-center bg-chess-pattern relative p-4 md:p-8">
            <iframe id="preview-frame" src=""
                class="w-full h-full border-0 bg-white shadow-2xl rounded-2xl transition-all duration-300"></iframe>
        </div>
    </main>

    <script>
        function loadComponent(btn, path, title, isSubBtn = false) {
            const frame = document.getElementById('preview-frame');
            const titleEl = document.getElementById('component-title');
            
            // Check if we are just navigating to an anchor within the already loaded Charte Graphique
            const isCharteNav = path.includes('charte graphique') && path.includes('#');
            const currentSrc = frame.src;
            const currentIsCharte = currentSrc.includes('charte%20graphique');

            if (!isSubBtn) {
                // Update Active State for main buttons
                document.querySelectorAll('.nav-btn').forEach(el => {
                    el.classList.remove('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-600');
                });
                if (btn && btn.classList) {
                    btn.classList.add('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    btn.classList.remove('text-gray-600');
                }
                
                // Reset sub-buttons
                document.querySelectorAll('.nav-sub-btn').forEach(el => {
                    el.classList.remove('text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-500');
                });
            } else {
                // Update Active State for sub-buttons
                document.querySelectorAll('.nav-sub-btn').forEach(el => {
                    el.classList.remove('text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-500');
                });
                if (btn && btn.classList) {
                    btn.classList.add('text-indigo-600', 'font-bold');
                    btn.classList.remove('text-gray-500');
                }
            }

            if (isCharteNav && currentIsCharte) {
                // Just update the hash to scroll to the section
                frame.src = path;
                titleEl.textContent = title;
                return;
            }

            frame.classList.add('opacity-0');
            setTimeout(() => {
                frame.src = path;
                titleEl.textContent = title;
                frame.onload = () => {
                    frame.classList.remove('opacity-0');
                };
            }, 200);
        }
        function resizeIframe(width) { document.getElementById('preview-frame').style.width = width; }
        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            loadComponent(firstBtn, './charte graphique/index.html', 'Charte Graphique');
        };
    </script>
