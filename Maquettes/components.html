<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Kit Gallery - SmartDress</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-chess-pattern {
            background-color: #f1f5f9;
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-full overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-tan/10 flex flex-col h-full flex-shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-tan/5 bg-offwhite">
            <div class="flex items-center gap-3 mb-2">
                <div style="font-family: 'Cormorant Garamond', serif;" class="text-2xl tracking-tight select-none flex items-baseline">
                    <span style="font-weight: 400; color: #5C4A35;">Smart</span>
                    <span style="font-weight: 600; font-style: italic; color: #889063; margin-left: -0.02em;">Dress</span>
                </div>
            </div>
        </div>

        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div>
                <h3 class="px-4 text-[10px] font-bold text-tan uppercase tracking-widest mb-4">Système de Design</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent(this, './charte graphique/index.html', 'Charte Graphique')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-bold text-bark rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3 bg-cream/20">
                        <span class="text-lg">🎨</span> Charte Graphique
                    </button>
                </div>
            </div>

            <div>
                <h3 class="px-4 text-[10px] font-bold text-tan uppercase tracking-widest mt-6 mb-4">Pages de l'Application</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent(this, './pages/auth.html', 'Auth (Connexion)')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">🔐</span> Connexion / Inscription
                    </button>
                    <button onclick="loadComponent(this, './pages/dashboard.html', 'Dashboard')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">📊</span> Tableau de bord
                    </button>
                    <button onclick="loadComponent(this, './pages/garde-robe.html', 'Garde-Robe')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">👗</span> Ma Garde-Robe
                    </button>
                    <button onclick="loadComponent(this, './pages/stats.html', 'Statistiques')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">📈</span> Statistiques
                    </button>
                    <button onclick="loadComponent(this, './pages/profile.html', 'Profil Utilisateur')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">👤</span> Profil
                    </button>
                </div>
            </div>

            <div>
                <h3 class="px-4 text-[10px] font-bold text-tan uppercase tracking-widest mt-6 mb-4">Organismes & Blocs</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent(this, './components/organisms/o-dashboard-user/index.html', 'Widget Dashboard')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">🧩</span> Widget Dashboard
                    </button>
                    <button onclick="loadComponent(this, './components/organisms/o-navbar/index.html', 'Navigation')"
                        class="nav-btn w-full text-left px-4 py-2.5 text-sm font-medium text-bark/70 rounded-xl hover:bg-cream/30 transition-all flex items-center gap-3">
                        <span class="text-lg">🧭</span> Barre de Navigation
                    </button>
                </div>
            </div>
            
            <div class="mt-8 border-t border-tan/5 pt-6">
                <a href="./index.html" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-bark text-white text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-moss transition-all shadow-lg shadow-bark/10">
                    🌍 Voir le Site Web
                </a>
            </div>

        </nav>
        <div class="p-6 border-t border-tan/5 bg-offwhite text-[9px] text-center text-tan font-bold uppercase tracking-widest">
            SmartDress Designers &copy; 2025</div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-100">
        <div class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-10">
            <h2 id="component-title" class="text-sm font-bold text-slate-800 uppercase tracking-wide">Sélectionnez un composant</h2>
            <div class="flex gap-4 items-center">
                <div class="flex bg-slate-100 rounded-xl p-1">
                    <button onclick="resizeIframe('100%')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Desktop</button>
                    <button onclick="resizeIframe('375px')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Mobile</button>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-center bg-chess-pattern relative p-4 md:p-8">
            <iframe id="preview-frame" src=""
                class="w-full h-full border-0 bg-white shadow-2xl rounded-2xl transition-all duration-300"></iframe>
        </div>
    </main>

    <script>
        function loadComponent(btn, path, title, isSubBtn = false) {
            const frame = document.getElementById('preview-frame');
            const titleEl = document.getElementById('component-title');
            
            // Check if we are just navigating to an anchor within the already loaded Charte Graphique
            const isCharteNav = path.includes('charte graphique') && path.includes('#');
            const currentSrc = frame.src;
            const currentIsCharte = currentSrc.includes('charte%20graphique');

            if (!isSubBtn) {
                // Update Active State for main buttons
                document.querySelectorAll('.nav-btn').forEach(el => {
                    el.classList.remove('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-600');
                });
                if (btn && btn.classList) {
                    btn.classList.add('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    btn.classList.remove('text-gray-600');
                }
                
                // Reset sub-buttons
                document.querySelectorAll('.nav-sub-btn').forEach(el => {
                    el.classList.remove('text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-500');
                });
            } else {
                // Update Active State for sub-buttons
                document.querySelectorAll('.nav-sub-btn').forEach(el => {
                    el.classList.remove('text-indigo-600', 'font-bold');
                    el.classList.add('text-gray-500');
                });
                if (btn && btn.classList) {
                    btn.classList.add('text-indigo-600', 'font-bold');
                    btn.classList.remove('text-gray-500');
                }
            }

            if (isCharteNav && currentIsCharte) {
                // Just update the hash to scroll to the section
                frame.src = path;
                titleEl.textContent = title;
                return;
            }

            frame.classList.add('opacity-0');
            setTimeout(() => {
                frame.src = path;
                titleEl.textContent = title;
                frame.onload = () => {
                    frame.classList.remove('opacity-0');
                };
            }, 200);
        }
        function resizeIframe(width) { document.getElementById('preview-frame').style.width = width; }
        window.onload = () => {
            const firstBtn = document.querySelector('.nav-btn');
            loadComponent(firstBtn, './charte graphique/index.html', 'Charte Graphique');
        };
    </script>
</body>

</html>
