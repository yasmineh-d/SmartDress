<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Kit Gallery - SmartDress</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-chess-pattern {
            background-color: #f1f5f9;
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-full overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col h-full flex-shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-gray-100 bg-slate-50">
            <div class="flex items-center gap-3 mb-2">
                <img src="./assets/images/smartdress_logo.png" alt="Logo" class="w-8 h-8">
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">SmartDress UI Hub</h1>
            </div>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Galerie Maquettage</p>
        </div>

        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div>
                <h3 class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Atoms</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent('./components/atoms/a-btn-primary/index.html', 'Bouton Primaire')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        🟢 Bouton Primaire</button>
                    <button onclick="loadComponent('./components/atoms/a-input-text/index.html', 'Input Text')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        📝 Input Text</button>
                    <button onclick="loadComponent('./components/atoms/a-logo/index.html', 'Logo')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        ✨ Logo</button>
                    <button onclick="loadComponent('./components/atoms/a-title-h1/index.html', 'Titre H1')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        <span class="text-lg">T</span> Titre H1</button>
                </div>
            </div>

            <div>
                <h3 class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Molecules</h3>
                <div class="space-y-1">
                    <button onclick="loadComponent('./components/molecules/m-card-suggestion/index.html', 'Carte Suggestion')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        🃏 Carte Suggestion</button>
                    <button onclick="loadComponent('./components/molecules/m-form-login/index.html', 'Formulaire Connexion')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        🔐 Formulaire Connexion</button>
                    <button onclick="loadComponent('./components/molecules/m-hero-splash/index.html', 'Hero Splash')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        🌊 Hero Splash</button>
                    <button onclick="loadComponent('./components/molecules/m-widget-weather/index.html', 'Widget Météo')"
                        class="w-full text-left px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-slate-50 transition-all">
                        🌤️ Widget Météo</button>
                </div>
            </div>
            
            <div class="mt-8 border-t pt-4">
                <a href="./index.html" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 text-sm font-bold rounded-lg hover:bg-indigo-100 transition-all">
                    🌍 Voir le Site Web
                </a>
            </div>

        </nav>
        <div class="p-4 border-t bg-slate-50 text-[10px] text-center text-gray-400 font-bold uppercase tracking-widest">
            SmartDress Designers</div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-100">
        <div class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-10">
            <h2 id="component-title" class="text-sm font-bold text-slate-800 uppercase tracking-wide">Sélectionnez un composant</h2>
            <div class="flex gap-4 items-center">
                <div class="flex bg-slate-100 rounded-xl p-1">
                    <button onclick="resizeIframe('100%')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Desktop</button>
                    <button onclick="resizeIframe('375px')"
                        class="px-4 py-1.5 text-[10px] font-bold rounded-lg hover:bg-white transition-all uppercase">Mobile</button>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-center bg-chess-pattern relative p-4 md:p-8">
            <iframe id="preview-frame" src=""
                class="w-full h-full border-0 bg-white shadow-2xl rounded-2xl transition-all duration-300"></iframe>
        </div>
    </main>

    <script>
        function loadComponent(path, title) {
            const frame = document.getElementById('preview-frame');
            const titleEl = document.getElementById('component-title');
            frame.classList.add('opacity-0');
            setTimeout(() => {
                frame.src = path;
                titleEl.textContent = title;
                frame.onload = () => frame.classList.remove('opacity-0');
            }, 200);
        }
        function resizeIframe(width) { document.getElementById('preview-frame').style.width = width; }
        window.onload = () => loadComponent('./components/atoms/a-btn-primary/index.html', 'Bouton Primaire');
    </script>
</body>

</html>
