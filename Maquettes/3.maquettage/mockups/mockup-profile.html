<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        slate: { 50: 'hsl(220, 15%, 98%)', 100: 'hsl(220, 15%, 95%)', 200: 'hsl(220, 15%, 90%)', 500: 'hsl(220, 15%, 50%)', 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../charte-graphique/style.css">
</head>

<body class="bg-slate-50 font-body text-slate-900 min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-100 px-6 pt-16 pb-10 sticky top-0 z-40">
        <div class="max-w-md mx-auto flex flex-col items-center space-y-4">
            <div class="w-24 h-24 rounded-3xl bg-gradient-to-tr from-indigo-500 to-coral-500 p-1">
                <div class="w-full h-full bg-white rounded-[1.4rem] overflow-hidden flex items-center justify-center">
                    <img src="https://ui-avatars.com/api/?name=User&background=3b4cc0&color=fff&size=128"
                        alt="Avatar User" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-heading font-bold text-slate-900">Yasmine Ha</h1>
                <p class="text-sm font-medium text-slate-400">Membre depuis Mars 2026</p>
            </div>
            <button
                class="px-6 py-2 bg-slate-900 text-white text-xs font-bold rounded-full hover:bg-slate-800 transition-colors">Modifier
                le profil</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">

        <!-- Account Settings -->
        <section class="space-y-3">
            <h2 class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Préférences</h2>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <button class="w-full px-6 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-indigo-50 text-indigo-500 rounded-xl flex items-center justify-center text-lg">
                            👗</div>
                        <span class="text-sm font-bold text-slate-700">Style de prédilection</span>
                    </div>
                    <span class="text-xs font-bold text-primary-500">Casual Chic</span>
                </button>
                <div class="h-[1px] bg-slate-50 mx-6"></div>
                <button class="w-full px-6 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center text-lg">
                            🔔</div>
                        <span class="text-sm font-bold text-slate-700">Notifications tenues</span>
                    </div>
                    <div class="w-10 h-6 bg-primary-500 rounded-full relative">
                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </button>
                <div class="h-[1px] bg-slate-50 mx-6"></div>
                <button class="w-full px-6 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-slate-50 text-slate-500 rounded-xl flex items-center justify-center text-lg">
                            📍</div>
                        <span class="text-sm font-bold text-slate-700">Localisation météo</span>
                    </div>
                    <span class="text-xs font-bold text-slate-400">Casablanca, MA</span>
                </button>
            </div>
        </section>

        <!-- Security -->
        <section class="space-y-3">
            <h2 class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sécurité</h2>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <button
                    class="w-full px-6 py-5 flex items-center justify-between hover:bg-slate-50 transition-colors text-red-500">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center text-lg">
                            🔒</div>
                        <span class="text-sm font-bold">Changer le mot de passe</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- Logout -->
        <button onclick="location.href='./mockup-accueil.html'"
            class="w-full py-5 text-red-500 font-heading font-bold bg-white rounded-3xl border-2 border-red-50 shadow-sm hover:bg-red-50 transition-all mt-4">
            Déconnexion
        </button>

    </main>

    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="location.href='./mockup-dashboard.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button onclick="location.href='./mockup-garde-robe.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <div class="w-14 h-14 relative -top-8 border-4 border-slate-50 rounded-full bg-slate-200"></div>
        <button onclick="location.href='./mockup-stats.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m12 4a2 2 0 100-4m0 4a2 2 0 110-4m-6 0a2 2 0 100 4m0-4a2 2 0 110 4" />
            </svg>
        </button>
        <button class="flex flex-col items-center gap-1 text-primary-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </button>
    </nav>

</body>

</html>
