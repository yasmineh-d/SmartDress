<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Ma Garde-Robe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        accent: { 500: 'hsl(15, 80%, 65%)' },
                        slate: { 50: 'hsl(220, 15%, 98%)', 100: 'hsl(220, 15%, 95%)', 200: 'hsl(220, 15%, 90%)', 500: 'hsl(220, 15%, 50%)', 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../charte-graphique/style.css">
</head>

<body class="bg-slate-50 font-body text-slate-900 min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-100 px-6 pt-12 pb-8 sticky top-0 z-40">
        <div class="max-w-md mx-auto space-y-6">
            <div class="flex items-center justify-between">
                <button onclick="location.href='./mockup-dashboard.html'"
                    class="w-12 h-12 flex items-center justify-center bg-slate-50 rounded-2xl hover:bg-slate-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-2xl font-heading font-bold text-slate-900">Ma Garde-Robe</h1>
                <div class="w-12"></div> <!-- Spacer -->
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-5 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" placeholder="Rechercher un vêtement..."
                    class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[2rem] focus:border-primary-500 focus:bg-white outline-none transition-all placeholder:text-slate-300 font-medium">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">

        <!-- Category Selector -->
        <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide no-scrollbar">
            <button
                class="px-6 py-2.5 bg-primary-500 text-white text-sm font-bold rounded-full shadow-lg shadow-primary-500/20 whitespace-nowrap">Tout</button>
            <button
                class="px-6 py-2.5 bg-white text-slate-500 text-sm font-bold rounded-full border border-slate-100 whitespace-nowrap hover:bg-slate-50">Hauts</button>
            <button
                class="px-6 py-2.5 bg-white text-slate-500 text-sm font-bold rounded-full border border-slate-100 whitespace-nowrap hover:bg-slate-50">Bas</button>
            <button
                class="px-6 py-2.5 bg-white text-slate-500 text-sm font-bold rounded-full border border-slate-100 whitespace-nowrap hover:bg-slate-50">Chaussures</button>
        </div>

        <!-- Clothing Grid -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Card 1 -->
            <div
                class="bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm hover:translate-y-[-4px] transition-all">
                <div
                    class="aspect-square bg-slate-50 rounded-[1.5rem] flex items-center justify-center text-5xl mb-4 relative">
                    👕
                    <div
                        class="absolute bottom-2 right-2 w-4 h-4 bg-white border-2 border-white rounded-full shadow-sm">
                    </div>
                </div>
                <div class="px-2 pb-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Coton / Blanc</p>
                    <h3 class="font-bold text-slate-900">T-Shirt Basique</h3>
                </div>
            </div>
            <!-- Card 2 -->
            <div
                class="bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm hover:translate-y-[-4px] transition-all">
                <div
                    class="aspect-square bg-indigo-50 rounded-[1.5rem] flex items-center justify-center text-5xl mb-4 relative">
                    🧥
                    <div
                        class="absolute bottom-2 right-2 w-4 h-4 bg-blue-600 border-2 border-primary-100 rounded-full shadow-sm">
                    </div>
                </div>
                <div class="px-2 pb-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Laine / Bleu</p>
                    <h3 class="font-bold text-slate-900">Veste Hiver</h3>
                </div>
            </div>
            <!-- Card 3 -->
            <div
                class="bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm hover:translate-y-[-4px] transition-all">
                <div
                    class="aspect-square bg-orange-50 rounded-[1.5rem] flex items-center justify-center text-5xl mb-4 relative">
                    👖
                    <div
                        class="absolute bottom-2 right-2 w-4 h-4 bg-slate-800 border-2 border-white rounded-full shadow-sm">
                    </div>
                </div>
                <div class="px-2 pb-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Denim / Noir</p>
                    <h3 class="font-bold text-slate-900">Jean Slim</h3>
                </div>
            </div>
            <!-- Card 4 -->
            <div
                class="bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm hover:translate-y-[-4px] transition-all">
                <div
                    class="aspect-square bg-slate-100 rounded-[1.5rem] flex items-center justify-center text-5xl mb-4 relative">
                    👟
                    <div
                        class="absolute bottom-2 right-2 w-4 h-4 bg-white border-2 border-white rounded-full shadow-sm">
                    </div>
                </div>
                <div class="px-2 pb-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Sport / Gris</p>
                    <h3 class="font-bold text-slate-900">Sneakers</h3>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Action Button (FAB) -->
    <button
        class="fixed bottom-28 right-6 w-16 h-16 bg-primary-500 text-white rounded-full flex items-center justify-center shadow-2xl shadow-primary-500/40 hover:scale-110 active:scale-95 transition-all z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
        </svg>
    </button>

    <!-- Bottom Nav (Copied for consistency) -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="location.href='./mockup-dashboard.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button class="flex flex-col items-center gap-1 text-primary-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <div class="w-14 h-14 relative -top-8 border-4 border-slate-50 rounded-full bg-slate-200"></div>
        <!-- Placeholder for FAB space -->
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m12 4a2 2 0 100-4m0 4a2 2 0 110-4m-6 0a2 2 0 100 4m0-4a2 2 0 110 4" />
            </svg>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </button>
    </nav>

</body>

</html>
