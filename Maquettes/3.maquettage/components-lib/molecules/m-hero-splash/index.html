<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        slate: { 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <!-- Molécule : m-hero-splash -->
    <section class="flex flex-col items-center text-center max-w-lg space-y-8">

        <!-- Atom : a-logo (intégré) -->
        <div class="relative group">
            <div
                class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-orange-400 rounded-full blur opacity-25 group-hover:opacity-100 transition duration-1000">
            </div>
            <img src="../../atoms/a-logo/smartdress_logo.png" alt="Logo" class="relative w-32 h-32 object-contain">
        </div>

        <!-- Atom : a-title-h1 (intégré) -->
        <h1 class="text-4xl md:text-5xl font-heading font-bold text-white tracking-tight leading-tight">
            SmartDress : Votre garde-robe devient <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-orange-300">intelligente</span>
        </h1>

        <!-- Atom : a-btn-primary (intégré) -->
        <button
            class="px-10 py-4 bg-primary-500 text-white font-heading font-bold rounded-2xl shadow-xl shadow-primary-500/20 hover:bg-primary-700 hover:scale-105 transition-all active:scale-95">
            Commencer l'expérience
        </button>

    </section>

</body>

</html>
