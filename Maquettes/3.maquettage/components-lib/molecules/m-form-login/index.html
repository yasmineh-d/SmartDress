<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        slate: { 100: 'hsl(220, 15%, 95%)', 500: 'hsl(220, 15%, 50%)', 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6 font-body">

    <!-- Molécule : m-form-login -->
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">

        <div class="space-y-2">
            <h2 class="text-2xl font-heading font-bold text-slate-900">Bon retour !</h2>
            <p class="text-slate-500">Connectez-vous pour voir votre tenue du jour.</p>
        </div>

        <form class="space-y-4">
            <!-- atoms : a-input-text (x2) -->
            <div class="space-y-1">
                <label class="text-sm font-semibold text-slate-500">Email</label>
                <input type="email" placeholder="nom@exemple.com"
                    class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-primary-500 focus:bg-white outline-none transition-all">
            </div>
            <div class="space-y-1">
                <div class="flex justify-between">
                    <label class="text-sm font-semibold text-slate-500">Mot de passe</label>
                    <a href="#" class="text-sm font-semibold text-primary-500 hover:text-primary-700">Oublié ?</a>
                </div>
                <input type="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-primary-500 focus:bg-white outline-none transition-all">
            </div>

            <!-- atom : a-btn-primary -->
            <button
                class="w-full py-4 bg-primary-500 text-white font-heading font-bold rounded-2xl shadow-lg shadow-primary-500/20 hover:bg-primary-700 transition-all mt-2">
                Se connecter
            </button>
        </form>

        <div class="relative py-2">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Ou
                    continuer avec</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button
                class="flex items-center justify-center py-3 border-2 border-slate-100 rounded-xl hover:bg-slate-50 transition-colors">
                <span class="font-bold text-slate-700">Google</span>
            </button>
            <button
                class="flex items-center justify-center py-3 border-2 border-slate-100 rounded-xl hover:bg-slate-50 transition-colors">
                <span class="font-bold text-slate-700">Apple</span>
            </button>
        </div>
    </div>

</body>

</html>
