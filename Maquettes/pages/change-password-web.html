<!DOCTYPE html>
<html lang="fr text-slate-900">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Modifier Profile (Web)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/charte.css">
    <link rel="stylesheet" href="../assets/css/style-landing.css">
</head>

<body class="bg-offwhite font-body text-bark min-h-screen flex flex-col">

    <!-- Header (Style Home) -->
    <header id="navbar" class="sd-navbar scrolled !fixed !bg-white/90">
        <div class="max-w-screen-xl mx-auto px-6 lg:px-12 flex items-center h-full gap-12">
            <a href="../index.html" class="sd-logo">Smart<span>Dress</span></a>

            <nav class="hidden lg:flex items-center gap-8">
                <a href="dashboard-web.html" class="sd-navlink">Dashboard</a>
                <a href="garde-robe-web.html" class="sd-navlink">Garde-Robe</a>
                <a href="favoris-web.html" class="sd-navlink">Favoris</a>
                <a href="profile-web.html" class="sd-navlink">Profil</a>
            </nav>

            <div class="ml-auto hidden lg:flex items-center gap-3">
                <a href="../index.html" class="sd-btn-ghost !py-2 !px-4 !text-[10px]">Déconnexion</a>
            </div>
        </div>
    </header>

    <div class="h-20"></div> <!-- Spacer for fixed navbar -->

    <main class="flex-1 max-w-xl w-full mx-auto p-12">
        <div class="space-y-12">
            <div class="flex items-center gap-4">
                <button onclick="location.href='profile-web.html'" class="w-10 h-10 flex items-center justify-center bg-white border border-tan/10 rounded-xl hover:bg-cream transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-tan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-4xl font-display font-medium text-bark italic">Mot de <span class="text-moss">Passe</span></h1>
            </div>

            <div class="bg-white p-10 rounded-[3rem] shadow-xl shadow-bark/5 border border-tan/10 space-y-8">
                <div class="space-y-2">
                    <p class="text-tan text-sm font-light">Votre nouveau mot de passe doit comporter au moins 8 caractères.</p>
                </div>

                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="px-2 text-[10px] font-bold text-tan uppercase tracking-widest">Mot de passe actuel</label>
                        <input type="password" class="w-full px-6 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss focus:ring-4 focus:ring-moss/5 transition-all text-bark font-medium">
                    </div>

                    <div class="space-y-6 pt-4 border-t border-tan/5">
                        <div class="space-y-2">
                            <label class="px-2 text-[10px] font-bold text-tan uppercase tracking-widest">Nouveau mot de passe</label>
                            <input type="password" class="w-full px-6 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss focus:ring-4 focus:ring-moss/5 transition-all text-bark font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="px-2 text-[10px] font-bold text-tan uppercase tracking-widest">Confirmer le nouveau mot de passe</label>
                            <input type="password" class="w-full px-6 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss focus:ring-4 focus:ring-moss/5 transition-all text-bark font-medium">
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col md:flex-row gap-4">
                        <button type="button" onclick="location.href='profile-web.html'" class="flex-1 py-4 border border-tan/20 text-tan rounded-full text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-cream/30 transition-all">
                            Annuler
                        </button>
                        <button type="submit" class="flex-1 py-4 bg-moss text-white rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-lg shadow-moss/20 hover:bg-bark transition-all">
                            Mettre à jour
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="sd-footer !mt-20">
        <div class="sd-footer-bottom">
            <span>© 2025–2026 SmartDress · Yasmine Haddad</span>
            <span>Formation Développement Mobile · Mode Bootcamp</span>
        </div>
    </footer>

</body>

</html>
