<!DOCTYPE html>
<html lang="fr text-slate-900">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Authentification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite font-body text-bark overflow-x-hidden">

    <section id="auth"
        class="min-h-screen flex items-center justify-center p-6 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-bark/60 backdrop-blur-sm"></div>

        <div class="w-full max-w-md space-y-8 relative z-10">

            <!-- Form -->
            <div
                class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-bark/50 border border-tan/10 space-y-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-tan to-moss"></div>

                <div class="space-y-4 text-center">
                    <div class="flex flex-col items-center gap-4 mb-6">
                        <a href="../index.html" class="p-2 hover:bg-cream rounded-full transition-colors">
                            <svg class="w-5 h-5 text-tan" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                        </a>
                        <div style="font-family: 'Cormorant Garamond', serif;" class="text-4xl tracking-tight select-none flex items-baseline">
                            <span style="font-weight: 400; color: #5C4A35;">Smart</span>
                            <span style="font-weight: 600; font-style: italic; color: #889063; margin-left: -0.02em;">Dress</span>
                        </div>
                    </div>
                    <h2 class="text-3xl font-display font-medium text-bark italic leading-tight">Bienvenue <em>parmi nous</em></h2>
                    <p class="text-bark/50 text-sm font-light">Connectez-vous pour accéder à votre garde-robe.</p>
                </div>

                <div class="flex gap-4 p-1.5 bg-cream/30 rounded-2xl" id="auth-tabs">
                    <button data-target="login"
                        class="tab-btn flex-1 py-3 text-[10px] font-bold uppercase tracking-widest bg-white text-bark rounded-xl shadow-sm border border-tan/10 transition-all">Connexion</button>
                    <button data-target="register"
                        class="tab-btn flex-1 py-3 text-[10px] font-bold uppercase tracking-widest text-tan hover:text-bark transition-all">Inscription</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form space-y-5">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Email</label>
                        <input type="email" placeholder="nom@exemple.com" required
                            class="w-full px-5 py-4 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em]">Mot de passe</label>
                            <a href="#" class="text-[10px] font-bold text-moss hover:text-bark uppercase tracking-widest transition-colors">Oublié ?</a>
                        </div>
                        <input type="password" placeholder="••••••••" required
                            class="w-full px-5 py-4 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
                    </div>

                    <button type="submit"
                        class="w-full py-5 bg-bark text-white font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full shadow-lg shadow-bark/20 hover:bg-moss hover:translate-y-[-2px] active:translate-y-0 transition-all mt-4">
                        Se connecter
                    </button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form space-y-5 hidden">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Nom complet</label>
                        <input type="text" placeholder="Jean Dupont"
                            class="w-full px-5 py-4 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Email</label>
                        <input type="email" placeholder="nom@exemple.com"
                            class="w-full px-5 py-4 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-1">Mot de passe</label>
                        <input type="password" placeholder="••••••••"
                            class="w-full px-5 py-4 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-bark/20 text-sm">
                    </div>

                    <button type="submit"
                        class="w-full py-5 bg-moss text-white font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full shadow-lg shadow-moss/20 hover:bg-bark hover:translate-y-[-2px] active:translate-y-0 transition-all mt-4">
                        Créer mon compte
                    </button>
                </form>

                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-tan/10"></div>
                    </div>
                    <div class="relative flex justify-center text-[10px] font-bold uppercase tracking-[0.2em]"><span
                            class="bg-white px-4 text-tan/60">Ou continuer avec</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button
                        class="flex items-center justify-center py-4 border border-tan/20 rounded-2xl hover:bg-cream/20 transition-all group">
                        <span class="text-[10px] font-bold text-bark/60 uppercase tracking-widest group-hover:text-bark">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center py-4 border border-tan/20 rounded-2xl hover:bg-cream/20 transition-all group">
                        <span class="text-[10px] font-bold text-bark/60 uppercase tracking-widest group-hover:text-bark">Apple</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const tabs = document.querySelectorAll('.tab-btn');
        const forms = document.querySelectorAll('.auth-form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.target;
                tabs.forEach(t => {
                    t.classList.remove('bg-white', 'text-bark', 'shadow-sm', 'border-tan/10');
                    t.classList.add('text-tan');
                });
                tab.classList.add('bg-white', 'text-bark', 'shadow-sm', 'border-tan/10');
                tab.classList.remove('text-tan');
                forms.forEach(f => f.classList.add('hidden'));
                document.getElementById(`${target}-form`).classList.remove('hidden');
            });
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center gap-2">Chargement...</span>';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        });
    </script>
</body>

</html>
