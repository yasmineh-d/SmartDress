<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Mot de Passe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bark font-body text-bark min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden">

    <!-- Background Flow Effect -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80')] bg-cover bg-center blur-md scale-110 opacity-60"></div>
        <div class="absolute inset-0 bg-bark/30 mix-blend-multiply"></div>
    </div>

    <!-- Mobile Mockup Container -->
    <div class="w-full max-w-[360px] my-8 bg-offwhite min-h-[90vh] rounded-[3.5rem] shadow-2xl relative z-10 flex flex-col overflow-hidden border-[8px] border-white/20">

        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-xl border-b border-tan/10 px-5 pt-10 pb-5 sticky top-0 z-40">
            <div class="flex items-center justify-between">
                <button onclick="location.href='profile_mobile.html'"
                    class="w-10 h-10 flex items-center justify-center bg-cream/50 rounded-xl hover:bg-cream transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-tan" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-xl font-display font-bold text-bark italic">Sécurité</h1>
                <div class="w-10"></div>
            </div>
        </header>

        <main class="flex-1 p-6 space-y-6 overflow-y-auto">
            <div class="bg-white p-6 rounded-3xl border border-tan/10 space-y-6">
                <p class="text-tan text-xs font-light">Mettez à jour votre mot de passe pour sécuriser votre compte.</p>

                <form class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Actuel</label>
                        <input type="password" class="w-full px-5 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium">
                    </div>

                    <div class="pt-2 space-y-4">
                        <div class="space-y-1.5">
                            <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Nouveau</label>
                            <input type="password" class="w-full px-5 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium">
                        </div>
                        <div class="space-y-1.5">
                            <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Confirmer</label>
                            <input type="password" class="w-full px-5 py-4 bg-offwhite border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium">
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col gap-3">
                        <button type="submit" class="w-full py-5 bg-moss text-white rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-xl shadow-moss/20 hover:bg-bark transition-all">
                            Mettre à jour
                        </button>
                        <button type="button" onclick="location.href='profile_mobile.html'" class="w-full py-4 border border-tan/20 text-tan rounded-full text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-cream/30 transition-all text-center">
                            Annuler
                        </button>
                    </div>
                </form>
            </div>
        </main>

    </div>
</body>

</html>
