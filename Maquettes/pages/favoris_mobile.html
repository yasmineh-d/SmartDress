<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Mes Favoris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Preline -->
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-bark font-body text-bark min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden">

    <!-- Background Flow Effect -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80')] bg-cover bg-center blur-md scale-110 opacity-60"></div>
        <div class="absolute inset-0 bg-bark/30 mix-blend-multiply"></div>
    </div>

    <!-- Mobile Mockup Container -->
    <div class="w-full max-w-[360px] my-8 bg-offwhite min-h-[90vh] rounded-[3.5rem] shadow-2xl relative z-10 flex flex-col overflow-hidden border-[8px] border-white/20">

        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-xl border-b border-tan/10 px-5 pt-10 pb-5 sticky top-0 z-40">
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <button onclick="location.href='dashboard_mobile.html'"
                        class="w-10 h-10 flex items-center justify-center bg-cream/50 rounded-xl hover:bg-cream transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-tan" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <h1 class="text-xl font-display font-bold text-bark italic">Mes Favoris</h1>
                    <div class="w-10"></div>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-4 flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-tan/40" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        </span>
                        <input type="text" id="search-input" placeholder="Rechercher..."
                            class="w-full pl-10 pr-4 py-3 bg-cream/30 border border-tan/10 rounded-2xl focus:border-moss focus:bg-white outline-none transition-all placeholder:text-tan/40 text-sm">
                    </div>

                    <!-- Preline Select Filter -->
                    <div class="relative">
                        <select id="filter-select" data-hs-select='{
                            "placeholder": "Filtrer par...",
                            "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                            "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-3 ps-4 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-tan/10 rounded-2xl text-start text-sm text-bark font-medium focus:border-moss focus:ring-2 focus:ring-moss/10 transition-all outline-none",
                            "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-tan/10 rounded-2xl overflow-hidden overflow-y-auto shadow-2xl",
                            "optionClasses": "py-2 px-4 w-full text-sm text-bark cursor-pointer hover:bg-cream/50 rounded-xl focus:outline-none focus:bg-cream/50 transition-colors",
                            "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-moss\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
                          }'>
                            <option value="all">Tout</option>
                            <option value="hauts">Hauts</option>
                            <option value="bas">Bas</option>
                            <option value="chaussures">Chaussures</option>
                        </select>

                        <div class="absolute top-1/2 end-3 -translate-y-1/2 pointer-events-none">
                            <svg class="shrink-0 size-3.5 text-tan" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m7 15 5 5 5-5"></path>
                                <path d="m7 9 5-5 5 5"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- ✅ FIX: w-full px-4 au lieu de max-w-md mx-auto px-6 -->
        <main class="w-full px-4 py-5 space-y-5 overflow-hidden flex-1">

            <!-- Category Selector -->
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide" id="category-filters">
                <button data-category="all"
                    class="filter-btn active flex-shrink-0 px-5 py-2 bg-moss text-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg shadow-moss/20 whitespace-nowrap transition-all">Tout</button>
                <button data-category="hauts"
                    class="filter-btn flex-shrink-0 px-5 py-2 bg-white text-tan text-[10px] font-bold uppercase tracking-widest rounded-full border border-tan/10 whitespace-nowrap hover:bg-cream/30 transition-all">Hauts</button>
                <button data-category="bas"
                    class="filter-btn flex-shrink-0 px-5 py-2 bg-white text-tan text-[10px] font-bold uppercase tracking-widest rounded-full border border-tan/10 whitespace-nowrap hover:bg-cream/30 transition-all">Bas</button>
                <button data-category="chaussures"
                    class="filter-btn flex-shrink-0 px-5 py-2 bg-white text-tan text-[10px] font-bold uppercase tracking-widest rounded-full border border-tan/10 whitespace-nowrap hover:bg-cream/30 transition-all">Chaussures</button>
            </div>

            <!-- ✅ FIX: overflow-hidden sur la grille -->
            <div class="grid grid-cols-2 gap-3 overflow-hidden" id="clothing-grid">

                <!-- Card 1 -->
                <div data-category="hauts"
                    class="clothing-card bg-white p-2 rounded-[2rem] border border-tan/10 shadow-sm hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="aspect-square bg-cream/40 rounded-[1.5rem] flex items-center justify-center text-4xl mb-2 relative shadow-inner border border-tan/5">
                        👕
                        <div class="absolute bottom-1.5 right-1.5 w-3 h-3 bg-white border border-tan/20 rounded-full shadow-sm"></div>
                        <button class="absolute top-2 right-2 p-1 rounded-full text-tan z-10" onclick="toggleFavorite(event, this)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-colors text-red-500" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                        </button>
                    </div>
                    <div class="px-2 pb-1">
                        <p class="text-[8px] font-bold text-tan uppercase tracking-widest mb-0.5 leading-none">Coton / Blanc</p>
                        <h3 class="text-xs font-display font-medium text-bark italic leading-tight">T-Shirt Basique</h3>
                    </div>
                </div>

                <!-- Card 2 -->
                <div data-category="hauts"
                    class="clothing-card bg-white p-2 rounded-[2rem] border border-tan/10 shadow-sm hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="aspect-square bg-bone/30 rounded-[1.5rem] flex items-center justify-center text-4xl mb-2 relative shadow-inner border border-tan/5">
                        🧥
                        <div class="absolute bottom-1.5 right-1.5 w-3 h-3 bg-moss border border-white rounded-full shadow-sm"></div>
                        <button class="absolute top-2 right-2 p-1 rounded-full text-tan z-10" onclick="toggleFavorite(event, this)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-colors text-red-500" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                        </button>
                    </div>
                    <div class="px-2 pb-1">
                        <p class="text-[8px] font-bold text-tan uppercase tracking-widest mb-0.5 leading-none">Laine / Bleu</p>
                        <h3 class="text-xs font-display font-medium text-bark italic leading-tight">Veste Hiver</h3>
                    </div>
                </div>

                <!-- Card 3 -->
                <div data-category="bas"
                    class="clothing-card bg-white p-2 rounded-[2rem] border border-tan/10 shadow-sm hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="aspect-square bg-cream/40 rounded-[1.5rem] flex items-center justify-center text-4xl mb-2 relative shadow-inner border border-tan/5">
                        👖
                        <div class="absolute bottom-1.5 right-1.5 w-3 h-3 bg-bark border border-white rounded-full shadow-sm"></div>
                        <button class="absolute top-2 right-2 p-1 rounded-full text-tan z-10" onclick="toggleFavorite(event, this)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-colors text-red-500" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                        </button>
                    </div>
                    <div class="px-2 pb-1">
                        <p class="text-[8px] font-bold text-tan uppercase tracking-widest mb-0.5 leading-none">Denim / Noir</p>
                        <h3 class="text-xs font-display font-medium text-bark italic leading-tight">Jean Slim</h3>
                    </div>
                </div>

                <!-- Card 4 ✅ FIX: plus coupée -->
                <div data-category="chaussures"
                    class="clothing-card bg-white p-2 rounded-[2rem] border border-tan/10 shadow-sm hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="aspect-square bg-bone/30 rounded-[1.5rem] flex items-center justify-center text-4xl mb-2 relative shadow-inner border border-tan/5">
                        👟
                        <div class="absolute bottom-1.5 right-1.5 w-3 h-3 bg-white border border-tan/20 rounded-full shadow-sm"></div>
                        <button class="absolute top-2 right-2 p-1 rounded-full text-tan z-10" onclick="toggleFavorite(event, this)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-colors text-red-500" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                            </svg>
                        </button>
                    </div>
                    <div class="px-2 pb-1">
                        <p class="text-[8px] font-bold text-tan uppercase tracking-widest mb-0.5 leading-none">Sport / Gris</p>
                        <h3 class="text-xs font-display font-medium text-bark italic leading-tight">Sneakers</h3>
                    </div>
                </div>

            </div>
        </main>

        <!-- Overlay / Backdrop -->
        <div id="modal-overlay"
            class="fixed inset-0 bg-bark/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300">
        </div>

        <!-- Modal : Détails Vêtement -->
        <div id="modal-details"
            class="fixed inset-x-6 bottom-6 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 bg-white rounded-[2.5rem] shadow-2xl z-[70] hidden opacity-0 translate-y-20 transition-all duration-300 max-w-sm w-full overflow-hidden">
            <div class="relative h-64 bg-cream/50 flex items-center justify-center">
                <button onclick="closeModal('modal-details')"
                    class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-tan hover:text-bark shadow-sm transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <span id="detail-icon" class="text-8xl">👕</span>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-2 text-center">
                    <h2 id="detail-name" class="text-3xl font-display font-medium text-bark italic">Nom du vêtement</h2>
                    <span id="detail-category"
                        class="inline-block px-3 py-1 bg-cream text-moss text-[9px] font-bold rounded-full uppercase tracking-widest border border-tan/10">Catégorie</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-cream/30 p-4 rounded-2xl text-center border border-tan/5">
                        <p class="text-[9px] font-bold text-tan uppercase mb-1">Dernier port</p>
                        <p class="text-sm font-bold text-bark">Il y a 2j</p>
                    </div>
                    <div class="bg-cream/30 p-4 rounded-2xl text-center border border-tan/5">
                        <p class="text-[9px] font-bold text-tan uppercase mb-1">État</p>
                        <p class="text-sm font-bold text-moss uppercase">Propre</p>
                    </div>
                </div>
                
                <div class="flex flex-col gap-3">
                    <button class="w-full py-4 bg-moss text-white font-body font-medium text-xs tracking-[0.15em] uppercase rounded-full shadow-lg shadow-moss/20 hover:bg-bark transition-all">
                        Ajouter à une tenue
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="py-3 bg-white border border-tan/10 text-tan hover:text-bark font-bold text-[9px] uppercase tracking-widest rounded-xl transition-all flex items-center justify-center gap-2">
                           <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                           </svg>
                           Modifier
                        </button>
                        <button class="py-3 bg-red-50/50 border border-red-100 text-red-400 hover:bg-red-500 hover:text-white font-bold text-[9px] uppercase tracking-widest rounded-xl transition-all flex items-center justify-center gap-2">
                           <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                           </svg>
                           Supprimer
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal : Ajouter un vêtement -->
        <div id="modal-add"
            class="fixed inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl z-[70] hidden translate-y-full transition-transform duration-500 max-w-[360px] mx-auto p-10 space-y-8">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-display font-medium text-bark italic">Ajouter au dressing</h2>
                <button onclick="closeModal('modal-add')" class="text-tan hover:text-bark transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form class="space-y-6" onsubmit="return false;">
                <div class="flex justify-center">
                    <div class="w-24 h-24 bg-cream/30 border-2 border-dashed border-tan/20 rounded-3xl flex flex-col items-center justify-center text-tan hover:bg-cream/50 transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="text-[9px] font-bold uppercase tracking-wider">Photo</span>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" placeholder="Nom de l'article (ex: Veste cuir)"
                        class="w-full px-5 py-4 bg-cream/20 border border-tan/10 rounded-2xl focus:border-moss outline-none transition-all font-medium placeholder:text-tan/40 text-sm">
                    
                    <!-- Preline Combobox -->
                    <div class="relative w-full" data-hs-combo-box='{
                        "groupingType": "default",
                        "preventSelection": true,
                        "isOpenOnFocus": true
                      }'>
                      <div class="relative">
                        <input class="w-full px-5 py-4 bg-cream/20 border border-tan/10 rounded-2xl focus:border-moss outline-none transition-all font-medium text-bark text-sm placeholder:text-tan/40" type="text" placeholder="Choisir une catégorie" data-hs-combo-box-input="">
                        <div class="absolute top-1/2 end-3 -translate-y-1/2 text-tan/40">
                          <svg class="flex-shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                        </div>
                      </div>

                      <!-- Search Results -->
                      <div class="absolute z-50 w-full mt-2 bg-white border border-tan/10 rounded-2xl shadow-xl overflow-hidden" style="display: none;" data-hs-combo-box-output="">
                        <div class="max-h-48 overflow-y-auto scrollbar-hide py-2" data-hs-combo-box-output-items-wrapper="">
                          <div class="cursor-pointer py-2 px-5 text-sm text-bark hover:bg-cream/30" data-hs-combo-box-output-item='{"value": "Hauts", "label": "Hauts"}'>
                            <span data-hs-combo-box-output-item-field="label">Hauts</span>
                          </div>
                          <div class="cursor-pointer py-2 px-5 text-sm text-bark hover:bg-cream/30" data-hs-combo-box-output-item='{"value": "Bas", "label": "Bas"}'>
                            <span data-hs-combo-box-output-item-field="label">Bas</span>
                          </div>
                          <div class="cursor-pointer py-2 px-5 text-sm text-bark hover:bg-cream/30" data-hs-combo-box-output-item='{"value": "Chaussures", "label": "Chaussures"}'>
                            <span data-hs-combo-box-output-item-field="label">Chaussures</span>
                          </div>
                          <div class="cursor-pointer py-2 px-5 text-sm text-bark hover:bg-cream/30" data-hs-combo-box-output-item='{"value": "Accessoires", "label": "Accessoires"}'>
                            <span data-hs-combo-box-output-item-field="label">Accessoires</span>
                          </div>
                        </div>
                      </div>
                    </div>
                </div>
                <button type="submit"
                    class="w-full py-5 bg-moss text-white font-body font-medium text-xs tracking-[0.2em] uppercase rounded-full shadow-xl shadow-moss/20 hover:bg-bark transition-all">
                    Enregistrer
                </button>
            </form>
        </div>

        <!-- Bottom Nav -->
        <nav class="sticky bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-tan/10 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
            <button onclick="location.href='dashboard_mobile.html'"
                class="flex flex-col items-center gap-1 text-tan hover:text-bark transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
            </button>
            <!-- Garde robe - NOT ACTIVE -->
            <button onclick="location.href='garde-robe_mobile.html'" class="flex flex-col items-center gap-1 text-tan hover:text-bark transition-colors">
                <!-- Garde Robe Icon (hanger approx) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </button>
            <div class="w-14 h-14 relative -top-8 border-4 border-white rounded-full bg-cream flex items-center justify-center shadow-lg">
                <button id="add-clothing-btn"
                    class="w-10 h-10 bg-moss rounded-full flex items-center justify-center text-white shadow-md hover:scale-105 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
            <!-- Mes Favoris - ACTIVE -->
            <button class="flex flex-col items-center gap-1 text-moss">
                <!-- Star icon for Favoris -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">

    <script>
        // ── Modal logic ──
        const overlay = document.getElementById('modal-overlay');

        function openModal(id) {
            const modal = document.getElementById(id);
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.classList.remove('translate-y-20', 'translate-y-full');
            }, 50);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('opacity-100');
            if (id === 'modal-add') modal.classList.add('translate-y-full');
            else modal.classList.add('translate-y-20');
            overlay.classList.remove('opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                overlay.classList.add('hidden');
            }, 300);
        }

        // ── Search & Filter ──
        const searchInput  = document.getElementById('search-input');
        const filterSelect = document.getElementById('filter-select');
        const filterBtns   = document.querySelectorAll('.filter-btn');
        const cards        = document.querySelectorAll('.clothing-card');

        function filterItems() {
            const query          = searchInput.value.toLowerCase();
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
            const selectVal      = filterSelect.value.toLowerCase();

            cards.forEach(card => {
                const title        = card.querySelector('h3').textContent.toLowerCase();
                const desc         = card.querySelector('p').textContent.toLowerCase();
                const cardCat      = card.dataset.category || '';
                
                const matchSearch  = title.includes(query) || desc.includes(query);
                const matchCatBtn  = activeCategory === 'all' || cardCat === activeCategory;
                const matchSelect  = selectVal === 'all' || cardCat === selectVal;

                // On combine les filtres : la recherche + la catégorie choisie (soit par bouton, soit par select)
                const isVisible = matchSearch && (activeCategory !== 'all' ? matchCatBtn : matchSelect);
                card.classList.toggle('hidden', !isVisible);
            });
        }

        searchInput.addEventListener('input', filterItems);
        
        // Preline custom event
        document.addEventListener('change', (e) => {
            if (e.target.id === 'filter-select') {
                // Synchronize with category buttons if needed, or just filter
                filterItems();
            }
        });

        filterBtns.forEach(btn => btn.addEventListener('click', () => {
            filterBtns.forEach(b => {
                b.classList.remove('active', 'bg-moss', 'text-white', 'shadow-lg', 'shadow-moss/20');
                b.classList.add('bg-white', 'text-tan', 'border-tan/10');
            });
            btn.classList.add('active', 'bg-moss', 'text-white', 'shadow-lg', 'shadow-moss/20');
            btn.classList.remove('bg-white', 'text-tan', 'border-tan/10');
            filterItems();
        }));

        // ── Card click → details modal ──
        cards.forEach(card => card.addEventListener('click', () => {
            document.getElementById('detail-name').textContent     = card.querySelector('h3').textContent;
            document.getElementById('detail-icon').textContent     = card.querySelector('.text-4xl').textContent.trim();
            document.getElementById('detail-category').textContent = card.dataset.category;
            openModal('modal-details');
        }));

        // ── FAB → add modal ──
        document.getElementById('add-clothing-btn').addEventListener('click', () => openModal('modal-add'));

        // ── Overlay click → close all ──
        overlay.addEventListener('click', () => {
            closeModal('modal-details');
            closeModal('modal-add');
        });

        // ── Toggle Favorite ──
        function toggleFavorite(e, btn) {
            e.stopPropagation(); // Empêche l'ouverture de la modale
            const svg = btn.querySelector('svg');
            const isFavorited = svg.getAttribute('fill') === 'currentColor';
            
            if (isFavorited) {
                // Retirer des favoris
                svg.setAttribute('fill', 'none');
                svg.classList.remove('text-red-500');
            } else {
                // Ajouter aux favoris
                svg.setAttribute('fill', 'currentColor');
                svg.classList.add('text-red-500');
            }
        }
    </script>
