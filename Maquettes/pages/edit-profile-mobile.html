<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Modifier Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bark font-body text-bark min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden">

    <!-- Background Flow Effect -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80')] bg-cover bg-center blur-md scale-110 opacity-60"></div>
        <div class="absolute inset-0 bg-bark/30 mix-blend-multiply"></div>
    </div>

    <!-- Mobile Mockup Container -->
    <div class="w-full max-w-[360px] my-8 bg-offwhite min-h-[90vh] rounded-[3.5rem] shadow-2xl relative z-10 flex flex-col overflow-hidden border-[8px] border-white/20">

        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-xl border-b border-tan/10 px-5 pt-10 pb-5 sticky top-0 z-40">
            <div class="flex items-center justify-between">
                <button onclick="location.href='profile_mobile.html'"
                    class="w-10 h-10 flex items-center justify-center bg-cream/50 rounded-xl hover:bg-cream transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-tan" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-xl font-display font-bold text-bark italic">Modifier Profil</h1>
                <div class="w-10"></div>
            </div>
        </header>

        <main class="flex-1 p-6 space-y-8 overflow-y-auto">
            <div class="flex flex-col items-center gap-6">
                <div class="relative w-28 h-28">
                    <div class="w-full h-full rounded-[2rem] bg-gradient-to-tr from-bark to-tan p-1">
                        <div class="w-full h-full bg-white rounded-[1.8rem] overflow-hidden flex items-center justify-center">
                            <img id="avatar-image" src="https://ui-avatars.com/api/?name=User&background=5C4A35&color=fff&size=256"
                                alt="Avatar" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <label for="avatar-input" class="absolute bottom-0 right-0 w-9 h-9 bg-moss text-white rounded-full shadow-lg border-4 border-white flex items-center justify-center cursor-pointer hover:scale-110 active:scale-95 transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </label>
                    <input type="file" id="avatar-input" accept="image/*" class="hidden">
                </div>
            </div>

            <form class="space-y-5">
                <div class="space-y-1.5">
                    <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Nom complet</label>
                    <input type="text" value="Yasmine Haddad" class="w-full px-5 py-4 bg-white border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium">
                </div>
                <div class="space-y-1.5">
                    <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Email</label>
                    <input type="email" value="yasmine@example.com" class="w-full px-5 py-4 bg-white border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium">
                </div>
                <div class="space-y-1.5">
                    <label class="px-2 text-[9px] font-bold text-tan uppercase tracking-widest">Bio</label>
                    <textarea class="w-full px-5 py-4 bg-white border border-tan/10 rounded-2xl focus:outline-none focus:border-moss transition-all text-bark text-sm font-medium h-24 resize-none" placeholder="Votre style..."></textarea>
                </div>

                <div class="pt-4 flex flex-col gap-3">
                    <button type="submit" class="w-full py-5 bg-moss text-white rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-xl shadow-moss/20 hover:bg-bark transition-all">
                        Enregistrer
                    </button>
                    <button type="button" onclick="location.href='profile_mobile.html'" class="w-full py-4 border border-tan/20 text-tan rounded-full text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-cream/30 transition-all text-center">
                        Annuler
                    </button>
                </div>
            </form>
        </main>

    </div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const avatarImage = document.getElementById('avatar-image');

        avatarInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarImage.src = e.target.result;
                    // Animation feedback
                    avatarImage.parentElement.classList.add('animate-pulse');
                    setTimeout(() => avatarImage.parentElement.classList.remove('animate-pulse'), 1000);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
