<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Mon Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/charte.css">
    <!-- Preline UI -->
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js"></script>
</head>

<body class="bg-bark font-body text-bark min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden">

    <!-- Background Flow Effect -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80')] bg-cover bg-center blur-md scale-110 opacity-60"></div>
        <div class="absolute inset-0 bg-bark/30 mix-blend-multiply"></div>
    </div>

    <!-- Mobile Mockup Container -->
    <div class="w-full max-w-[360px] my-8 bg-offwhite min-h-[90vh] rounded-[3.5rem] shadow-2xl relative z-10 flex flex-col overflow-hidden border-[8px] border-white/20">
        <div class="max-w-md mx-auto flex flex-col items-center space-y-4">
            <div class="w-24 h-24 rounded-3xl bg-gradient-to-tr from-bark to-tan p-1">
                <div class="w-full h-full bg-white rounded-[1.4rem] overflow-hidden flex items-center justify-center">
                    <img src="https://ui-avatars.com/api/?name=User&background=5C4A35&color=fff&size=128"
                        alt="Avatar User" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-display font-medium text-bark italic">Yasmine Haddad</h1>
                <p class="text-sm font-medium text-tan/60">Membre depuis Mars 2026</p>
            </div>
            <button onclick="location.href='edit-profile-mobile.html'"
                class="px-8 py-2.5 bg-bark text-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg shadow-bark/20 hover:bg-moss transition-all">Modifier
                le profil</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">

        <!-- Account Settings -->
        <section class="space-y-3">
            <h2 class="px-2 text-[10px] font-bold text-tan uppercase tracking-widest">Préférences</h2>
            <div class="bg-white rounded-[2rem] shadow-sm border border-tan/10 overflow-hidden">
                <div class="p-6 space-y-4">
                    <!-- Toggle Auto/Manual -->
                    <div class="flex items-center justify-between px-2 pt-2">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-moss/10 text-moss rounded-lg flex items-center justify-center text-sm">🤖</div>
                            <span class="text-[10px] font-bold text-tan uppercase tracking-widest">Mode Automatique (IA)</span>
                        </div>
                        <button id="auto-style-toggle-mobile" class="w-10 h-5 bg-tan/20 rounded-full relative transition-colors duration-300">
                            <div id="toggle-dot-mobile" class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-transform duration-300"></div>
                        </button>
                    </div>

                    <div class="h-[1px] bg-tan/5"></div>

                    <button id="style-btn-mobile" class="w-full py-4 flex items-center justify-between hover:bg-cream/30 transition-colors relative overflow-hidden rounded-2xl">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-cream/50 text-tan rounded-xl flex items-center justify-center text-lg">👗</div>
                            <span class="text-sm font-medium text-bark">Style de prédilection</span>
                        </div>
                        
                        <div id="style-display-container" class="flex items-center">
                            <span id="style-value-mobile" class="text-xs font-bold text-moss uppercase">Casual Chic</span>
                        </div>

                        <!-- IA Loading Overlay -->
                        <div id="ai-loader-mobile" class="absolute inset-0 bg-white/80 backdrop-blur-[1px] flex items-center justify-center hidden">
                            <div class="flex items-center gap-2">
                                <svg class="animate-spin h-4 w-4 text-moss" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <span class="text-[9px] font-bold text-moss uppercase tracking-widest">Analyse en cours...</span>
                            </div>
                        </div>
                    </button>
                </div>
                <div class="h-[1px] bg-tan/5 mx-6"></div>
                <button id="notification-toggle-mobile" class="w-full px-6 py-5 flex items-center justify-between hover:bg-cream/30 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-cream/50 text-tan rounded-xl flex items-center justify-center text-lg">
                            🔔</div>
                        <span class="text-sm font-medium text-bark">Notifications tenues</span>
                    </div>
                    <div id="notif-bg-mobile" class="w-10 h-6 bg-moss rounded-full relative transition-colors duration-300">
                        <div id="notif-dot-mobile" class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-300"></div>
                    </div>
                </button>
                <div class="h-[1px] bg-tan/5 mx-6"></div>
                <button class="w-full px-6 py-5 flex items-center justify-between hover:bg-cream/30 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-cream/50 text-tan rounded-xl flex items-center justify-center text-lg">
                            📍</div>
                        <span class="text-sm font-medium text-bark">Localisation météo</span>
                    </div>
                    <span class="text-xs font-bold text-tan/60 text-right">Casablanca, MA</span>
                </button>
            </div>
        </section>

        <!-- Security -->
        <section class="space-y-3">
            <h2 class="px-2 text-[10px] font-bold text-tan uppercase tracking-widest">Sécurité & Compte</h2>
            <div class="bg-white rounded-[2rem] shadow-sm border border-tan/10 overflow-hidden">
                <button onclick="location.href='change-password-mobile.html'"
                    class="w-full px-6 py-5 flex items-center justify-between hover:bg-cream/30 transition-colors">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-cream/50 text-tan rounded-xl flex items-center justify-center text-lg">
                            🔒</div>
                        <span class="text-sm font-medium text-bark">Changer le mot de passe</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-tan/40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <div class="h-[1px] bg-tan/5 mx-6"></div>
                <button onclick="location.href='auth.html'"
                    class="w-full px-6 py-5 flex items-center justify-between hover:bg-red-50/30 transition-colors group">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 bg-red-50 text-red-400 rounded-xl flex items-center justify-center text-lg group-hover:bg-red-100 transition-colors">
                            🚪</div>
                        <span class="text-sm font-bold text-red-500">Déconnexion</span>
                    </div>
                </button>
            </div>
        </section>
    </main>

    <!-- Overlay / Backdrop -->
    <div id="modal-overlay"
        class="fixed inset-0 bg-bark/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300">
    </div>

    <!-- Modal : Ajouter un vêtement -->
    <div id="modal-add"
        class="fixed inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl z-[70] hidden translate-y-full transition-transform duration-500 max-w-[360px] mx-auto p-10 space-y-8">
        <div class="flex items-center justify-between">
            <h2 class="text-2xl font-display font-medium text-bark italic">Ajouter au dressing</h2>
            <button onclick="closeModal('modal-add')" class="text-tan hover:text-bark transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <form class="space-y-6" onsubmit="return false;">
            <div class="flex justify-center">
                <div class="w-24 h-24 bg-cream/30 border-2 border-dashed border-tan/20 rounded-3xl flex flex-col items-center justify-center text-tan hover:bg-cream/50 transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-[9px] font-bold uppercase tracking-wider">Photo</span>
                </div>
            </div>
            <div class="space-y-4">
                <input type="text" placeholder="Nom de l'article (ex: Veste cuir)"
                    class="w-full px-5 py-4 bg-cream/20 border border-tan/10 rounded-2xl focus:border-moss outline-none transition-all font-medium placeholder:text-tan/40 text-sm placeholder:italic">
                
                <!-- Preline Select Component -->
                <div class="relative">
                    <select data-hs-select='{
                        "placeholder": "Choisir une catégorie...",
                        "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                        "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-4 ps-5 pe-12 flex gap-x-2 text-nowrap w-full cursor-pointer bg-cream/20 border border-tan/10 rounded-2xl text-start text-sm font-medium focus:outline-none focus:ring-1 focus:ring-moss dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 appearance-none",
                        "dropdownClasses": "mt-2 z-[110] w-full max-h-72 p-1 space-y-0.5 bg-white border border-tan/10 rounded-2xl overflow-hidden overflow-y-auto shadow-2xl dark:bg-neutral-900 dark:border-neutral-700",
                        "optionClasses": "py-3 px-5 w-full text-sm text-bark cursor-pointer hover:bg-cream/50 rounded-xl focus:outline-none focus:bg-cream/50 transition-colors",
                        "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-moss\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
                      }'>
                      <option value="">Choisir une catégorie...</option>
                      <option value="hauts">Hauts</option>
                      <option value="bas">Bas</option>
                      <option value="chaussures">Chaussures</option>
                      <option value="accessoires">Accessoires</option>
                    </select>
                  
                    <div class="absolute top-1/2 end-4 -translate-y-1/2 pointer-events-none">
                      <svg class="shrink-0 size-4 text-tan/60" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m7 15 5 5 5-5"></path>
                        <path d="m7 9 5-5 5 5"></path>
                      </svg>
                    </div>
                </div>
            </div>
            <button onclick="closeModal('modal-add')" class="w-full py-5 bg-bark text-white rounded-full text-[10px] font-bold uppercase tracking-[0.2em] shadow-xl shadow-bark/20 hover:bg-moss transition-all">
                Ajouter l'article
            </button>
        </form>
    </div>

    <!-- Bottom Nav -->
    <nav
        class="sticky bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-tan/10 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="location.href='dashboard_mobile.html'" class="text-tan hover:text-bark transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button onclick="location.href='garde-robe_mobile.html'" class="text-tan hover:text-bark transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <div class="w-14 h-14 relative -top-8 border-4 border-white rounded-full bg-cream flex items-center justify-center shadow-lg">
            <button id="add-item-btn" class="w-10 h-10 bg-moss rounded-full flex items-center justify-center text-white shadow-md hover:scale-105 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>
        <button onclick="location.href='favoris_mobile.html'" class="text-tan hover:text-bark transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
        </button>
        <button class="text-moss">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z" />
            </svg>
        </button>
    </nav>
    </div> <!-- End Mobile Mockup Container -->

    <script>
        // ── Style Hybrid Logic Mobile (Auto/Manual) ──
        const autoStyleBtn = document.getElementById('auto-style-toggle-mobile');
        const toggleDot = document.getElementById('toggle-dot-mobile');
        const styleBtn = document.getElementById('style-btn-mobile');
        const styleValue = document.getElementById('style-value-mobile');
        const aiLoader = document.getElementById('ai-loader-mobile');
        let isAuto = false;

        autoStyleBtn.addEventListener('click', () => {
            isAuto = !isAuto;
            
            if (isAuto) {
                // UI Switch
                autoStyleBtn.classList.add('bg-moss');
                autoStyleBtn.classList.remove('bg-tan/20');
                toggleDot.style.transform = 'translateX(20px)';
                
                // Show AI Loader
                aiLoader.classList.remove('hidden');
                styleBtn.classList.add('pointer-events-none');
                
                // Simulate AI Detection
                setTimeout(() => {
                    aiLoader.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-base">✨</span>
                            <span class="text-[9px] font-bold text-moss uppercase tracking-widest">Style IA : Minimaliste</span>
                        </div>
                    `;
                    styleValue.textContent = "Minimaliste (Auto)";
                }, 1500);
            } else {
                // UI Switch back
                autoStyleBtn.classList.remove('bg-moss');
                autoStyleBtn.classList.add('bg-tan/20');
                toggleDot.style.transform = 'translateX(0)';
                
                // Hide Loader
                aiLoader.classList.add('hidden');
                styleBtn.classList.remove('pointer-events-none');
                styleValue.textContent = "Casual Chic";
                
                // Reset Loader Content
                aiLoader.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="animate-spin h-4 w-4 text-moss" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span class="text-[9px] font-bold text-moss uppercase tracking-widest">Analyse en cours...</span>
                    </div>
                `;
            }
        });

        // ── Notification Toggle Logic Mobile ──
        const notifBtn = document.getElementById('notification-toggle-mobile');
        const notifBg = document.getElementById('notif-bg-mobile');
        const notifDot = document.getElementById('notif-dot-mobile');
        let notifEnabled = true;

        notifBtn.addEventListener('click', () => {
            notifEnabled = !notifEnabled;
            if (notifEnabled) {
                notifBg.classList.replace('bg-tan/20', 'bg-moss');
                notifDot.style.transform = 'translateX(0)';
            } else {
                notifBg.classList.replace('bg-moss', 'bg-tan/20');
                notifDot.style.transform = 'translateX(-16px)';
            }
        });

        // ── Modal logic ──
        const modalOverlay = document.getElementById('modal-overlay');
        const addItemBtn = document.getElementById('add-item-btn');

        function openModal(id) {
            const modal = document.getElementById(id);
            modalOverlay.classList.remove('hidden');
            setTimeout(() => modalOverlay.classList.add('opacity-100'), 10);
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.classList.remove('translate-y-full');
            }, 50);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('opacity-100');
            modal.classList.add('translate-y-full');
            modalOverlay.classList.remove('opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modalOverlay.classList.add('hidden');
            }, 300);
        }

        addItemBtn.addEventListener('click', () => openModal('modal-add'));
        modalOverlay.addEventListener('click', () => closeModal('modal-add'));
    </script>
</body>

</html>
