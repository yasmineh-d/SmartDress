<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Statistiques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite font-body text-bark min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-white border-b border-tan/10 px-6 pt-12 pb-6 sticky top-0 z-40">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <button onclick="location.href='dashboard.html'"
                class="w-10 h-10 flex items-center justify-center bg-cream rounded-xl text-tan hover:text-bark transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-2xl font-display font-medium text-bark italic">Statistiques</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-tan/10">
                <p class="text-[10px] font-bold text-tan uppercase tracking-widest mb-1">Total Portés</p>
                <p class="text-4xl font-display font-medium text-moss italic">128</p>
                <p class="text-[9px] text-moss font-bold mt-2 uppercase tracking-wide">+12% ce mois</p>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-tan/10">
                <p class="text-[10px] font-bold text-tan uppercase tracking-widest mb-1">Tenues Crées</p>
                <p class="text-4xl font-display font-medium text-bark italic">42</p>
                <p class="text-[9px] text-tan font-bold mt-2 uppercase tracking-wide">Depuis Janvier</p>
            </div>
        </div>

        <!-- Most Worn Section -->
        <section class="space-y-4">
            <h2 class="text-xl font-display font-medium text-bark italic">Le plus <em>porté</em></h2>
            <div class="bg-white rounded-[2rem] shadow-sm border border-tan/10 divide-y divide-tan/5 overflow-hidden">
                <div class="p-5 flex items-center gap-5 group hover:bg-cream/20 transition-all">
                    <div class="w-14 h-14 bg-cream rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:bg-moss group-hover:text-white transition-all">👕</div>
                    <div class="flex-1">
                        <p class="font-medium text-bark italic">T-Shirt Blanc</p>
                        <p class="text-[10px] font-bold text-tan uppercase tracking-widest mt-0.5">Porté 15 fois</p>
                    </div>
                    <div class="w-20 h-2 bg-cream rounded-full overflow-hidden shadow-inner">
                        <div class="w-[85%] h-full bg-moss shadow-sm"></div>
                    </div>
                </div>
                <div class="p-5 flex items-center gap-5 group hover:bg-cream/20 transition-all">
                    <div class="w-14 h-14 bg-cream rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:bg-moss group-hover:text-white transition-all">👖</div>
                    <div class="flex-1">
                        <p class="font-medium text-bark italic">Jean Slim</p>
                        <p class="text-[10px] font-bold text-tan uppercase tracking-widest mt-0.5">Porté 12 fois</p>
                    </div>
                    <div class="w-20 h-2 bg-cream rounded-full overflow-hidden shadow-inner">
                        <div class="w-[65%] h-full bg-bark shadow-sm"></div>
                    </div>
                </div>
                <div class="p-5 flex items-center gap-5 group hover:bg-cream/20 transition-all">
                    <div class="w-14 h-14 bg-cream rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:bg-moss group-hover:text-white transition-all">👟</div>
                    <div class="flex-1">
                        <p class="font-medium text-bark italic">Sneakers Gris</p>
                        <p class="text-[10px] font-bold text-tan uppercase tracking-widest mt-0.5">Porté 10 fois</p>
                    </div>
                    <div class="w-20 h-2 bg-cream rounded-full overflow-hidden shadow-inner">
                        <div class="w-[50%] h-full bg-tan shadow-sm"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Usage Chart Placeholder -->
        <section class="space-y-4">
            <h2 class="text-xl font-display font-medium text-bark italic">Activité <em>Hebdomadaire</em></h2>
            <div
                class="bg-white p-8 rounded-[2rem] shadow-sm border border-tan/10 h-56 flex items-end justify-between gap-3">
                <div class="flex-1 bg-cream/30 rounded-2xl h-[40%] transition-all hover:bg-moss/20"></div>
                <div class="flex-1 bg-moss rounded-2xl h-[80%] transition-all hover:opacity-80 shadow-lg shadow-moss/10"></div>
                <div class="flex-1 bg-cream/30 rounded-2xl h-[60%] transition-all hover:bg-moss/20"></div>
                <div class="flex-1 bg-bark rounded-2xl h-[95%] transition-all hover:opacity-80 shadow-lg shadow-bark/10"></div>
                <div class="flex-1 bg-cream/30 rounded-2xl h-[30%] transition-all hover:bg-moss/20"></div>
                <div class="flex-1 bg-cream/30 rounded-2xl h-[50%] transition-all hover:bg-moss/20"></div>
                <div class="flex-1 bg-cream/30 rounded-2xl h-[20%] transition-all hover:bg-moss/20"></div>
            </div>
            <div class="flex justify-between px-3 text-[9px] font-bold text-tan uppercase tracking-widest">
                <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
            </div>
        </section>

    </main>

    <!-- Navigation -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-tan/10 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(8C,74,53,0.05)]">
        <button onclick="location.href='dashboard.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button onclick="location.href='garde-robe.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <div class="w-14 h-14 relative -top-8 border-4 border-offwhite rounded-full bg-cream/10"></div>
        <button class="active-nav flex flex-col items-center gap-1 text-moss">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m12 4a2 2 0 100-4m0 4a2 2 0 110-4m-6 0a2 2 0 100 4m0-4a2 2 0 110 4" />
            </svg>
        </button>
        <button onclick="location.href='profile.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </button>
    </nav>

</body>

</html>
