<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Statistiques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: 'hsl(230, 60%, 50%)', 700: 'hsl(230, 60%, 35%)' },
                        accent: { 500: 'hsl(15, 80%, 65%)' },
                        slate: { 50: 'hsl(220, 15%, 98%)', 100: 'hsl(220, 15%, 95%)', 200: 'hsl(220, 15%, 90%)', 500: 'hsl(220, 15%, 50%)', 900: 'hsl(220, 15%, 10%)' }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/charte.css">
</head>

<body class="bg-slate-50 font-body text-slate-900 min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-100 px-6 pt-12 pb-6 sticky top-0 z-40">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <button onclick="location.href='dashboard.html'"
                class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="text-xl font-heading font-bold text-slate-900">Statistiques</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">

        <!-- Summary Cards -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Portés</p>
                <p class="text-3xl font-heading font-bold text-primary-500">128</p>
                <p class="text-[10px] text-emerald-500 font-bold mt-1">+12% ce mois</p>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tenues Crées</p>
                <p class="text-3xl font-heading font-bold text-accent-500">42</p>
                <p class="text-[10px] text-slate-400 font-bold mt-1">Depuis Janvier</p>
            </div>
        </div>

        <!-- Most Worn Section -->
        <section class="space-y-4">
            <h2 class="text-lg font-heading font-bold text-slate-900">Le plus porté</h2>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 divide-y divide-slate-50">
                <div class="p-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-2xl">👕</div>
                    <div class="flex-1">
                        <p class="font-bold text-sm text-slate-900">T-Shirt Blanc</p>
                        <p class="text-xs text-slate-400">Porté 15 fois</p>
                    </div>
                    <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="w-[85%] h-full bg-primary-500"></div>
                    </div>
                </div>
                <div class="p-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center text-2xl">👖</div>
                    <div class="flex-1">
                        <p class="font-bold text-sm text-slate-900">Jean Slim</p>
                        <p class="text-xs text-slate-400">Porté 12 fois</p>
                    </div>
                    <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="w-[65%] h-full bg-accent-500"></div>
                    </div>
                </div>
                <div class="p-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-2xl">👟</div>
                    <div class="flex-1">
                        <p class="font-bold text-sm text-slate-900">Sneakers Gris</p>
                        <p class="text-xs text-slate-400">Porté 10 fois</p>
                    </div>
                    <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="w-[50%] h-full bg-slate-400"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Usage Chart Placeholder -->
        <section class="space-y-4">
            <h2 class="text-lg font-heading font-bold text-slate-900">Activité Hebdomadaire</h2>
            <div
                class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 h-48 flex items-end justify-between gap-2">
                <div class="w-8 bg-slate-100 rounded-t-lg h-[40%]"></div>
                <div class="w-8 bg-primary-500 rounded-t-lg h-[80%]"></div>
                <div class="w-8 bg-slate-100 rounded-t-lg h-[60%]"></div>
                <div class="w-8 bg-primary-500 rounded-t-lg h-[95%]"></div>
                <div class="w-8 bg-slate-100 rounded-t-lg h-[30%]"></div>
                <div class="w-8 bg-slate-100 rounded-t-lg h-[50%]"></div>
                <div class="w-8 bg-slate-100 rounded-t-lg h-[20%]"></div>
            </div>
            <div class="flex justify-between px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="location.href='dashboard.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </button>
        <button onclick="location.href='garde-robe.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <div class="w-14 h-14 relative -top-8 border-4 border-slate-50 rounded-full bg-slate-200"></div>
        <button class="flex flex-col items-center gap-1 text-primary-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m12 4a2 2 0 100-4m0 4a2 2 0 110-4m-6 0a2 2 0 100 4m0-4a2 2 0 110 4" />
            </svg>
        </button>
        <button onclick="location.href='profile.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </button>
    </nav>

</body>

</html>
