<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDress - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bark: '#5C4A35',
                        moss: '#889063',
                        tan: '#CFBB99',
                        bone: '#E5D7C4',
                        cream: '#F5EEE4',
                        offwhite: '#FDFAF6',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-offwhite font-body text-bark min-h-screen pb-24">

    <!-- Header Section -->
    <header class="bg-white border-b border-tan/10 px-6 pt-16 pb-10 sticky top-0 z-40">
        <div class="max-w-md mx-auto flex flex-col items-center space-y-6">
            <div class="relative">
                <div class="w-32 h-32 rounded-[2.5rem] bg-gradient-to-tr from-tan to-moss p-1 shadow-xl shadow-moss/10">
                    <div class="w-full h-full bg-white rounded-[2.2rem] flex items-center justify-center overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=User&background=889063&color=fff&size=128" alt="Avatar User" class="w-full h-full object-cover">
                    </div>
                </div>
                <button class="absolute bottom-1 right-1 w-10 h-10 bg-bark text-white rounded-2xl flex items-center justify-center border-4 border-white shadow-lg active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                </button>
            </div>
            <div class="text-center">
                <h1 class="text-3xl font-display font-medium text-bark italic">Yasmine Haddad</h1>
                <p class="text-xs font-bold text-tan uppercase tracking-widest mt-1">Membre depuis Mars 2026</p>
            </div>
            <button class="px-8 py-3 bg-bark text-white text-[10px] font-bold uppercase tracking-widest rounded-full hover:bg-moss transition-all shadow-lg shadow-bark/20">Modifier le profil</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">

        <!-- Account Settings -->
        <section class="space-y-4">
            <h2 class="px-2 text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-2">Préférences</h2>
            <div class="bg-white rounded-[2rem] border border-tan/10 shadow-sm overflow-hidden">
                <button class="w-full px-8 py-6 flex items-center justify-between hover:bg-cream/20 transition-all border-b border-tan/5 group">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-cream rounded-2xl flex items-center justify-center text-xl group-hover:bg-moss group-hover:text-white transition-all shadow-sm">👗</div>
                        <span class="text-sm font-medium text-bark">Style de prédilection</span>
                    </div>
                    <span class="text-[10px] font-bold text-moss uppercase tracking-widest">Casual Chic</span>
                </button>
                <button class="w-full px-8 py-6 flex items-center justify-between hover:bg-cream/20 transition-all border-b border-tan/5 group">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-cream rounded-2xl flex items-center justify-center text-xl group-hover:bg-moss group-hover:text-white transition-all shadow-sm">🔔</div>
                        <span class="text-sm font-medium text-bark">Notifications tenues</span>
                    </div>
                    <div class="w-12 h-7 bg-moss rounded-full relative shadow-inner">
                        <div class="absolute right-1 top-1 w-5 h-5 bg-white rounded-full shadow-md"></div>
                    </div>
                </button>
                <button class="w-full px-8 py-6 flex items-center justify-between hover:bg-cream/20 transition-all group">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-cream rounded-2xl flex items-center justify-center text-xl group-hover:bg-moss group-hover:text-white transition-all shadow-sm">📍</div>
                        <span class="text-sm font-medium text-bark">Localisation météo</span>
                    </div>
                    <span class="text-[10px] font-bold text-tan uppercase tracking-widest">Casablanca, MA</span>
                </button>
            </div>
        </section>

        <!-- Security -->
        <section class="space-y-4">
            <h2 class="px-2 text-[10px] font-bold text-tan uppercase tracking-[0.2em] ml-2">Sécurité</h2>
            <div class="bg-white rounded-[2rem] border border-tan/10 shadow-sm overflow-hidden">
                <button
                    class="w-full px-8 py-6 flex items-center justify-between hover:bg-cream/20 transition-all group">
                    <div class="flex items-center gap-5">
                        <div
                            class="w-12 h-12 bg-cream rounded-2xl flex items-center justify-center text-xl group-hover:bg-moss group-hover:text-white transition-all shadow-sm">
                            🔒</div>
                        <span class="text-sm font-medium text-bark">Changer le mot de passe</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-tan/40" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- Logout -->
        <button onclick="location.href='auth.html'"
            class="w-full py-6 text-red-500 text-[10px] font-bold uppercase tracking-[0.2em] bg-white rounded-[2rem] border border-red-100 shadow-sm hover:bg-red-50 transition-all mt-4">
            Déconnexion
        </button>

    </main>

    <!-- Navigation -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-tan/10 px-8 py-4 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(8C,74,53,0.05)]">
        <button onclick="location.href='dashboard.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
        </button>
        <button onclick="location.href='garde-robe.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </button>
        <button
            class="w-14 h-14 bg-moss rounded-full flex items-center justify-center text-white shadow-xl shadow-moss/30 relative -top-8 border-4 border-offwhite active:scale-95 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
            </svg>
        </button>
        <button onclick="location.href='stats.html'"
            class="flex flex-col items-center gap-1 text-tan hover:text-moss transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m12 4a2 2 0 100-4m0 4a2 2 0 110-4m-6 0a2 2 0 100 4m0-4a2 2 0 110 4" />
            </svg>
        </button>
        <button class="active-nav flex flex-col items-center gap-1 text-moss">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
        </button>
    </nav>

</body>

</html>
